<!DOCTYPE html>
<html>
<head>
<title>3D Ball Minecraft</title>
<style>
body { margin:0; overflow:hidden; }
#crosshair {
  position:fixed;
  top:50%; left:50%;
  width:10px; height:10px;
  margin-left:-5px; margin-top:-5px;
  background:white;
}
</style>
</head>
<body>
<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/controls/PointerLockControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// CAMERA
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

// RENDERER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// CONTROLS (mouse look)
const controls = new THREE.PointerLockControls(camera, document.body);
document.body.addEventListener("click",()=>controls.lock());
scene.add(controls.getObject());

// WORLD
const blocks=[];
const geo = new THREE.BoxGeometry();
const mat = new THREE.MeshStandardMaterial({color:0x55aa55});

// SIMPLE TERRAIN
for(let x=-20;x<20;x++){
  for(let z=-20;z<20;z++){
    let height = Math.floor(Math.random()*3); // terrain

    for(let y=0;y<=height;y++){
      const b=new THREE.Mesh(geo,mat);
      b.position.set(x,y,z);
      scene.add(b);
      blocks.push(b);
    }
  }
}

// PLAYER BALL
const player = new THREE.Mesh(
  new THREE.SphereGeometry(0.5,32,32),
  new THREE.MeshStandardMaterial({color:"cyan"})
);
scene.add(player);

let velocity = new THREE.Vector3();
let canJump=false;

// START POSITION
controls.getObject().position.set(0,5,5);

// INPUT
let keys={};

document.addEventListener("keydown",e=>{
  keys[e.key]=true;
  if(e.key===" " && canJump){
    velocity.y=0.25;
    canJump=false;
  }
});

document.addEventListener("keyup",e=>{
  keys[e.key]=false;
});

// RAYCAST (block interaction)
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(0,0);

document.addEventListener("mousedown",(e)=>{
  raycaster.setFromCamera(mouse,camera);
  const hits = raycaster.intersectObjects(blocks);

  if(hits.length>0){
    const hit = hits[0];

    // BREAK
    if(e.button===0){
      scene.remove(hit.object);
      blocks.splice(blocks.indexOf(hit.object),1);
    }

    // PLACE
    if(e.button===2){
      const newBlock = new THREE.Mesh(geo,mat);
      newBlock.position.copy(hit.object.position).add(hit.face.normal);
      scene.add(newBlock);
      blocks.push(newBlock);
    }
  }
});

document.addEventListener("contextmenu",e=>e.preventDefault());

// LOOP
function animate(){
  requestAnimationFrame(animate);

  velocity.y -= 0.01;

  if(keys["w"]) controls.moveForward(0.1);
  if(keys["s"]) controls.moveForward(-0.1);
  if(keys["a"]) controls.moveRight(-0.1);
  if(keys["d"]) controls.moveRight(0.1);

  controls.getObject().position.y += velocity.y;

  if(controls.getObject().position.y < 2){
    velocity.y = 0;
    controls.getObject().position.y = 2;
    canJump = true;
  }

  // BALL follows player
  player.position.copy(controls.getObject().position);
  player.position.y -= 1;

  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
