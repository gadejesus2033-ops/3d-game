<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Minecraft Clone (Stabilized)</title>
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }
#overlay { position:absolute; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; flex-direction:column; color:white; }
#hotbar { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:10px; }
.slot { width:40px; height:40px; border:2px solid white; display:flex; align-items:center; justify-content:center; }
.active { border:2px solid yellow; }
</style>
</head>
<body>

<div id="overlay">
<h1>Click to Play</h1>
<button id="startBtn">Start</button>
</div>

<div id="hotbar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>
<script>
// ===== CORE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(50,100,50);
scene.add(light);

// ===== BLOCKS =====
const loader = new THREE.TextureLoader();
const tex = loader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');

const materials = {
 grass: new THREE.MeshLambertMaterial({map:tex}),
 dirt: new THREE.MeshLambertMaterial({map:tex}),
 stone: new THREE.MeshLambertMaterial({color:0x888888})
};

const geometry = new THREE.BoxGeometry(1,1,1);
const blocks = {};

function key(x,y,z){ return `${x},${y},${z}`; }

function createBlock(x,y,z,type){
 if(blocks[key(x,y,z)]) return;
 const cube = new THREE.Mesh(geometry, materials[type]);
 cube.position.set(x,y,z);
 scene.add(cube);
 blocks[key(x,y,z)] = cube;
}

// ===== TERRAIN =====
function noise(x,z){ return Math.sin(x*0.1)*Math.cos(z*0.1); }

let generated = new Set();

function generateChunk(cx,cz){
 const chunkKey = cx+","+cz;
 if(generated.has(chunkKey)) return;
 generated.add(chunkKey);

 for(let x=cx-20;x<cx+20;x++){
  for(let z=cz-20;z<cz+20;z++){
   const h = Math.floor(noise(x,z)*5);
   for(let y=-5;y<=h;y++){
    let type = y===h ? 'grass' : (y>h-3?'dirt':'stone');
    createBlock(x,y,z,type);
   }
  }
 }
}

// ===== CONTROLS =====
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const overlay=document.getElementById('overlay');
document.getElementById('startBtn').onclick=()=>controls.lock();
controls.addEventListener('lock',()=>overlay.style.display='none');
controls.addEventListener('unlock',()=>overlay.style.display='flex');

// ===== INVENTORY =====
const inventory=['grass','dirt','stone'];
let selected=0;
const hotbar=document.getElementById('hotbar');
function renderHotbar(){
 hotbar.innerHTML='';
 inventory.forEach((item,i)=>{
  const div=document.createElement('div');
  div.className='slot'+(i===selected?' active':'');
  div.innerText=item[0];
  hotbar.appendChild(div);
 });
}
renderHotbar();

window.addEventListener('keydown',e=>{
 if(e.key>='1'&&e.key<='3'){ selected=Number(e.key)-1; renderHotbar(); }
});

// ===== MOVEMENT =====
let velocity=new THREE.Vector3();
let dir=new THREE.Vector3();
let moveF,moveB,moveL,moveR;
let gravity=0.04;
let jumpForce=0.25;
let onGround=false;

const playerHeight=1.8;
const stepHeight=1;

camera.position.set(0,10,0);

window.addEventListener('keydown',e=>{
 if(e.code==='KeyW')moveF=true;
 if(e.code==='KeyS')moveB=true;
 if(e.code==='KeyA')moveL=true;
 if(e.code==='KeyD')moveR=true;
 if(e.code==='Space' && onGround){ velocity.y=jumpForce; }
});
window.addEventListener('keyup',e=>{
 if(e.code==='KeyW')moveF=false;
 if(e.code==='KeyS')moveB=false;
 if(e.code==='KeyA')moveL=false;
 if(e.code==='KeyD')moveR=false;
});

function blockAt(x,y,z){ return blocks[key(Math.round(x),Math.round(y),Math.round(z))]; }

function canMove(x,y,z){
 return !blockAt(x,y,z) && !blockAt(x,y-1,z);
}

function tryMove(dx,dz){
 let nx = camera.position.x + dx;
 let nz = camera.position.z + dz;
 let y = camera.position.y;

 if(canMove(nx,y,nz)){
  camera.position.x=nx;
  camera.position.z=nz;
  return;
 }

 if(canMove(nx,y+stepHeight,nz)){
  camera.position.x=nx;
  camera.position.z=nz;
  camera.position.y+=stepHeight;
 }
}

function getGround(x,z){
 let max=-Infinity;
 for(const k in blocks){
  const [bx,by,bz]=k.split(',').map(Number);
  if(Math.round(bx)===Math.round(x)&&Math.round(bz)===Math.round(z)){
   if(by>max) max=by;
  }
 }
 return max===-Infinity ? -5 : max;
}

// ===== INTERACTION =====
const ray=new THREE.Raycaster();
window.addEventListener('mousedown',e=>{
 if(!controls.isLocked)return;
 ray.setFromCamera(new THREE.Vector2(0,0),camera);
 const hits=ray.intersectObjects(Object.values(blocks));
 if(hits.length){
  const hit=hits[0];
  const p=hit.object.position;
  if(e.button===0){ scene.remove(hit.object); delete blocks[key(p.x,p.y,p.z)]; }
  if(e.button===2){
   const n=hit.face.normal;
   createBlock(p.x+n.x,p.y+n.y,p.z+n.z,inventory[selected]);
  }
 }
});
window.addEventListener('contextmenu',e=>e.preventDefault());

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 // generate only nearby chunks
 const cx=Math.floor(camera.position.x/20)*20;
 const cz=Math.floor(camera.position.z/20)*20;
 generateChunk(cx,cz);

 dir.z=Number(moveF)-Number(moveB);
 dir.x=Number(moveR)-Number(moveL);
 dir.normalize();

 const speed=0.05;
 velocity.x*=0.8; velocity.z*=0.8; velocity.y-=gravity;
 if(moveF||moveB) velocity.z-=dir.z*speed;
 if(moveL||moveR) velocity.x-=dir.x*speed;

 tryMove(-velocity.x,0);
 tryMove(0,-velocity.z);

 camera.position.y+=velocity.y;

 const ground=getGround(camera.position.x,camera.position.z);
 const floor=ground+playerHeight;

 if(camera.position.y<=floor){
  camera.position.y=floor;
  velocity.y=0;
  onGround=true;
 } else onGround=false;

 renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
