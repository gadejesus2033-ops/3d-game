<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Game WORKING</title>

<style>
body{margin:0;overflow:hidden;background:black;}
#overlay{
 position:absolute;inset:0;
 display:flex;align-items:center;justify-content:center;
 color:white;font-family:sans-serif;
 cursor:pointer;background:black;
}
#crosshair{
 position:fixed;left:50%;top:50%;
 width:10px;height:10px;
 transform:translate(-50%,-50%);
}
#crosshair:before,#crosshair:after{
 content:"";position:absolute;background:white;
}
#crosshair:before{width:10px;height:2px;top:4px;}
#crosshair:after{width:2px;height:10px;left:4px;}
#hud{position:fixed;bottom:10px;left:10px;color:white;font-family:sans-serif;}
</style>
</head>

<body>

<div id="overlay">CLICK TO START</div>
<div id="crosshair"></div>
<div id="hud"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ===== GLOBAL FIX =====
let health = 100; // <-- FIXED (was missing before)

// ===== SCENE =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));

// ===== CONTROLS =====
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

const overlay=document.getElementById("overlay");

// ✅ START FIX
overlay.addEventListener("click",()=>{
 controls.lock();
});

controls.addEventListener("lock",()=>{
 overlay.style.display="none";
});

controls.addEventListener("unlock",()=>{
 overlay.style.display="flex";
});

// ===== INPUT =====
const keys={},inventory={grass:10,dirt:10,stone:10,torch:5};
let breaking=false;

document.addEventListener("keydown",e=>{
 keys[e.code]=true;

 if(e.code==="KeyK") saveGame();
 if(e.code==="KeyL") loadGame();
});

document.addEventListener("keyup",e=>{
 keys[e.code]=false;
});

document.addEventListener("mousedown",e=>{
 if(e.button===0) breaking=true;
});

document.addEventListener("mouseup",e=>{
 if(e.button===0) breaking=false;
});

// ===== CONSTANTS =====
const HEIGHT=1.8,EYE=1.6,WIDTH=0.3;

// ===== TEXTURE =====
function tex(c){
 const c2=document.createElement("canvas");
 c2.width=8;c2.height=8;
 const ctx=c2.getContext("2d");

 for(let x=0;x<8;x++){
  for(let y=0;y<8;y++){
   let s=c+Math.random()*20;
   ctx.fillStyle=`rgb(${s},${s},${s})`;
   ctx.fillRect(x,y,1,1);
  }
 }

 const t=new THREE.CanvasTexture(c2);
 t.magFilter=t.minFilter=THREE.NearestFilter;
 return t;
}

const mats={
 grass:new THREE.MeshLambertMaterial({map:tex(120)}),
 dirt:new THREE.MeshLambertMaterial({map:tex(100)}),
 stone:new THREE.MeshLambertMaterial({map:tex(80)}),
 torch:new THREE.MeshBasicMaterial({color:0xffaa00})
};

const geo=new THREE.BoxGeometry(1,1,1);

// ===== WORLD =====
const SIZE=50, HALF=SIZE/2;
let world=[];

function generate(){
 world=[];
 for(let x=-HALF;x<HALF;x++){
  for(let z=-HALF;z<HALF;z++){
   for(let y=0;y<3;y++){
    world.push({x,y,z,type:y===2?"grass":"dirt"});
   }
   for(let y=-1;y>-20;y--){
    world.push({x,y,z,type:"stone"});
   }
  }
 }
}
generate();

// ===== BUILD =====
let meshes={};

function build(){
 for(const m in meshes) scene.remove(meshes[m]);
 meshes={};

 const groups={};
 world.forEach(b=>{
  if(!groups[b.type]) groups[b.type]=[];
  groups[b.type].push(b);
 });

 for(const type in groups){
  const arr=groups[type];
  const mesh=new THREE.InstancedMesh(geo,mats[type],arr.length);
  const m=new THREE.Matrix4();

  arr.forEach((b,i)=>{
   m.setPosition(b.x,b.y,b.z);
   mesh.setMatrixAt(i,m);
  });

  scene.add(mesh);
  meshes[type]=mesh;
 }
}
build();

// ===== COLLISION =====
function collide(px,py,pz){
 for(const b of world){
  if(Math.abs(px-b.x)<0.5&&Math.abs(py-b.y)<HEIGHT&&Math.abs(pz-b.z)<0.5)
   return true;
 }
 return false;
}

// ===== PHYSICS =====
let vy=0,onGround=false;
const gravity=-0.02,jump=0.35;

camera.position.set(0,10,10);

// ===== RAY =====
const ray=new THREE.Raycaster();
ray.far=6;

let breakTimer=0,target=null;

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed=0.15;

 const f=new THREE.Vector3();
 camera.getWorldDirection(f);f.y=0;f.normalize();

 const r=new THREE.Vector3();
 r.crossVectors(f,new THREE.Vector3(0,1,0)).normalize();

 let dx=0,dz=0;
 if(keys["KeyW"]){dx+=f.x*speed;dz+=f.z*speed;}
 if(keys["KeyS"]){dx-=f.x*speed;dz-=f.z*speed;}
 if(keys["KeyA"]){dx-=r.x*speed;dz-=r.z*speed;}
 if(keys["KeyD"]){dx+=r.x*speed;dz+=r.z*speed;}

 let nx=camera.position.x+dx,nz=camera.position.z+dz;

 if(!collide(nx,camera.position.y-EYE,camera.position.z)) camera.position.x=nx;
 if(!collide(camera.position.x,camera.position.y-EYE,nz)) camera.position.z=nz;

 vy+=gravity;
 let ny=camera.position.y+vy;

 if(vy<=0){
  if(collide(camera.position.x,ny-EYE,camera.position.z)){
   camera.position.y=Math.floor(ny-EYE)+EYE+1;
   vy=0;onGround=true;
  } else camera.position.y=ny;
 } else camera.position.y=ny;

 if(keys["Space"]&&onGround){vy=jump;onGround=false;}

 // BREAK
 ray.setFromCamera({x:0,y:0},camera);
 const hits=ray.intersectObjects(Object.values(meshes));

 if(hits.length){
  const p=hits[0].point;
  const bx=Math.round(p.x);
  const by=Math.round(p.y);
  const bz=Math.round(p.z);

  if(breaking){
   breakTimer++;
   if(breakTimer>10){
    const i=world.findIndex(b=>b.x===bx&&b.y===by&&b.z===bz);
    if(i!==-1){
     world.splice(i,1);
     build();
    }
    breakTimer=0;
   }
  } else breakTimer=0;
 }

 // HUD
 hud.innerText="Health: "+health;

 renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
