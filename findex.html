<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Engine + Crosshair</title>

<style>
body { margin:0; overflow:hidden; }

/* OVERLAY */
#overlay{
 position:absolute;
 inset:0;
 background:#000;
 color:#fff;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:20px;
 cursor:pointer;
}

/* CROSSHAIR */
#crosshair{
 position:fixed;
 left:50%;
 top:50%;
 width:10px;
 height:10px;
 transform:translate(-50%,-50%);
 pointer-events:none;
}

#crosshair:before,
#crosshair:after{
 content:"";
 position:absolute;
 background:white;
}

#crosshair:before{
 width:10px;
 height:2px;
 top:4px;
 left:0;
}

#crosshair:after{
 width:2px;
 height:10px;
 left:4px;
 top:0;
}
</style>
</head>

<body>

<div id="overlay">CLICK TO START</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(20,30,10);
scene.add(light);

// ================= CAMERA =================
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ================= WORLD =================
const geo = new THREE.BoxGeometry(1,1,1);

const mat = {
 grass:new THREE.MeshLambertMaterial({color:0x3cb043}),
 dirt:new THREE.MeshLambertMaterial({color:0x8b5a2b}),
 stone:new THREE.MeshLambertMaterial({color:0x888888})
};

const world = new Map();
const meshes = [];

const key=(x,y,z)=>`${x},${y},${z}`;

function add(x,y,z,material){
 const m=new THREE.Mesh(geo,material);
 m.position.set(x,y,z);
 scene.add(m);
 meshes.push(m);
 world.set(key(x,y,z),1);
}

function remove(x,y,z){
 const k=key(x,y,z);
 if(!world.has(k)) return;
 world.delete(k);

 const obj=meshes.find(m=>m.position.x===x&&m.position.y===y&&m.position.z===z);
 if(obj) scene.remove(obj);
}

// ================= WORLD =================
for(let x=-25;x<25;x++){
 for(let z=-25;z<25;z++){
  add(x,-1,z,mat.grass);
  add(x,-2,z,mat.dirt);
 }
}

// ================= PLAYER =================
const player={
 width:0.6,
 depth:0.6,
 height:2
};

let velY=0;
let onGround=false;

const gravity=-0.015;
const jumpPower=0.22;

// ================= COLLISION =================
function solid(x,y,z){
 return world.has(`${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`);
}

function collide(px,py,pz){
 const w=player.width/2;
 const d=player.depth/2;

 const minX=px-w;
 const maxX=px+w;
 const minY=py;
 const maxY=py+player.height;
 const minZ=pz-d;
 const maxZ=pz+d;

 for(let x=Math.floor(minX);x<=Math.floor(maxX);x++){
  for(let y=Math.floor(minY);y<=Math.floor(maxY);y++){
   for(let z=Math.floor(minZ);z<=Math.floor(maxZ);z++){
    if(solid(x,y,z)) return true;
   }
  }
 }
 return false;
}

// ================= MOVE =================
function move(dx,dz){
 const steps=6;

 for(let i=0;i<steps;i++){
  let sx=dx/steps;
  let sz=dz/steps;

  let nx=camera.position.x+sx;
  let nz=camera.position.z+sz;

  if(!collide(nx,camera.position.y,camera.position.z)){
   camera.position.x=nx;
  }

  if(!collide(camera.position.x,camera.position.y,nz)){
   camera.position.z=nz;
  }
 }
}

// ================= CONTROLS =================
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

document.getElementById("overlay").onclick=()=>{
 document.body.requestPointerLock();
};

document.addEventListener("pointerlockchange",()=>{
 document.getElementById("overlay").style.display=
 document.pointerLockElement===document.body?"none":"flex";
});

// ================= INPUT =================
const k={w:false,a:false,s:false,d:false};

window.onkeydown=e=>{
 if(e.code==="KeyW")k.w=true;
 if(e.code==="KeyA")k.a=true;
 if(e.code==="KeyS")k.s=true;
 if(e.code==="KeyD")k.d=true;

 if(e.code==="Space"&&onGround){
  velY=jumpPower;
  onGround=false;
 }
};

window.onkeyup=e=>{
 if(e.code==="KeyW")k.w=false;
 if(e.code==="KeyA")k.a=false;
 if(e.code==="KeyS")k.s=false;
 if(e.code==="KeyD")k.d=false;
};

// ================= RAYCAST =================
const ray=new THREE.Raycaster();

window.addEventListener("mousedown",e=>{
 ray.setFromCamera({x:0,y:0},camera);

 const hits=ray.intersectObjects(meshes);
 if(!hits.length) return;

 const hit=hits[0];

 const pos=hit.object.position;

 const x=Math.floor(pos.x);
 const y=Math.floor(pos.y);
 const z=Math.floor(pos.z);

 // BREAK
 if(e.button===0){
  remove(x,y,z);
 }

 // PLACE (FACE BASED FIX)
 if(e.button===2){
  const n=hit.face.normal;

  const px=x+n.x;
  const py=y+n.y;
  const pz=z+n.z;

  if(!world.has(key(px,py,pz))){
   add(px,py,pz,mat.stone);
  }
 }
});

window.addEventListener("contextmenu",e=>e.preventDefault());

// ================= START =================
camera.position.set(0,5,5);

// ================= LOOP =================
function animate(){
 requestAnimationFrame(animate);

 const speed=0.12;

 const dir=new THREE.Vector3();
 camera.getWorldDirection(dir);
 dir.y=0;
 dir.normalize();

 const right=new THREE.Vector3();
 right.crossVectors(dir,new THREE.Vector3(0,1,0)).normalize();

 let dx=0,dz=0;

 if(k.w){dx+=dir.x*speed;dz+=dir.z*speed;}
 if(k.s){dx-=dir.x*speed;dz-=dir.z*speed;}
 if(k.a){dx-=right.x*speed;dz-=right.z*speed;}
 if(k.d){dx+=right.x*speed;dz+=right.z*speed;}

 move(dx,dz);

 // gravity
 velY+=gravity;
 camera.position.y+=velY;

 const feet=camera.position.y-player.height;

 if(collide(camera.position.x,feet,camera.position.z)){
  camera.position.y=Math.ceil(camera.position.y);
  velY=0;
  onGround=true;
 } else {
  onGround=false;
 }

 renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
