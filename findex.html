<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Basic 3D World</title>
<style>
body{margin:0;overflow:hidden;background:black;}
#overlay{
 position:absolute;inset:0;
 display:flex;align-items:center;justify-content:center;
 color:white;font-family:sans-serif;cursor:pointer;
}
</style>
</head>

<body>
<div id="overlay">CLICK TO START</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// ===== CONTROLS =====
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const overlay = document.getElementById("overlay");

overlay.onclick = () => controls.lock();
controls.addEventListener("lock",()=>overlay.style.display="none");
controls.addEventListener("unlock",()=>overlay.style.display="flex");

// ===== PLAYER =====
let velocityY = 0;
let onGround = false;

const gravity = -0.02;
const jump = 0.3;

// ===== WORLD =====
const blocks = new Map();
const key = (x,y,z)=>`${x},${y},${z}`;

// create simple terrain
for(let x=-20;x<20;x++){
 for(let z=-20;z<20;z++){
  let height = Math.floor(Math.sin(x*0.2)*2 + Math.cos(z*0.2)*2);

  for(let y=-5;y<=height;y++){
   blocks.set(key(x,y,z),1);

   const cube = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshLambertMaterial({color:0x3cb043})
   );
   cube.position.set(x,y,z);
   scene.add(cube);
  }
 }
}

// ===== COLLISION =====
function isSolid(x,y,z){
 return blocks.has(key(x,y,z));
}

function collide(px,py,pz){

 const minX = Math.floor(px - 0.3);
 const maxX = Math.floor(px + 0.3);
 const minY = Math.floor(py - 1.7);
 const maxY = Math.floor(py);
 const minZ = Math.floor(pz - 0.3);
 const maxZ = Math.floor(pz + 0.3);

 for(let x=minX;x<=maxX;x++){
  for(let y=minY;y<=maxY;y++){
   for(let z=minZ;z<=maxZ;z++){
    if(isSolid(x,y,z)) return true;
   }
  }
 }
 return false;
}

// ===== INPUT =====
const keys={};

document.addEventListener("keydown",e=>{
 keys[e.code]=true;

 if(e.code==="Space" && onGround){
  velocityY = jump;
 }
});

document.addEventListener("keyup",e=>keys[e.code]=false);

// ===== START =====
camera.position.set(0,5,5);

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed = 0.1;

 // direction
 const dir = new THREE.Vector3();
 camera.getWorldDirection(dir);
 dir.y = 0;
 dir.normalize();

 const right = new THREE.Vector3();
 right.crossVectors(dir,new THREE.Vector3(0,1,0)).normalize();

 // ===== MOVE X =====
 let dx = 0;
 let dz = 0;

 if(keys["KeyW"]){dx+=dir.x*speed; dz+=dir.z*speed;}
 if(keys["KeyS"]){dx-=dir.x*speed; dz-=dir.z*speed;}
 if(keys["KeyA"]){dx-=right.x*speed; dz-=right.z*speed;}
 if(keys["KeyD"]){dx+=right.x*speed; dz+=right.z*speed;}

 let nx = camera.position.x + dx;
 if(!collide(nx,camera.position.y,camera.position.z)){
  camera.position.x = nx;
 }

 let nz = camera.position.z + dz;
 if(!collide(camera.position.x,camera.position.y,nz)){
  camera.position.z = nz;
 }

 // ===== GRAVITY =====
 velocityY += gravity;
 let ny = camera.position.y + velocityY;

 if(velocityY <= 0){
  if(collide(camera.position.x,ny,camera.position.z)){
   camera.position.y = Math.floor(camera.position.y);
   velocityY = 0;
   onGround = true;
  } else {
   camera.position.y = ny;
   onGround = false;
  }
 } else {
  if(collide(camera.position.x,ny,camera.position.z)){
   velocityY = 0;
  } else {
   camera.position.y = ny;
  }
 }

 renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
