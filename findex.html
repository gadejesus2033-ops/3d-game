<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Engine Ultimate</title>

<style>
body{margin:0;overflow:hidden;background:black;}
#overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:white;cursor:pointer;background:black;}
#crosshair{position:fixed;left:50%;top:50%;width:10px;height:10px;transform:translate(-50%,-50%);}
#crosshair:before,#crosshair:after{content:"";position:absolute;background:white;}
#crosshair:before{width:10px;height:2px;top:4px;}
#crosshair:after{width:2px;height:10px;left:4px;}
#hud{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);color:white;font-family:sans-serif;}
</style>
</head>

<body>
<div id="overlay">CLICK TO START</div>
<div id="crosshair"></div>
<div id="hud"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ===== BASIC SETUP =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// lighting
scene.add(new THREE.AmbientLight(0xffffff,0.5));
const sun=new THREE.DirectionalLight(0xffffff,1);
sun.position.set(20,40,20);
scene.add(sun);

// controls
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

const overlay=document.getElementById("overlay");
overlay.onclick=()=>controls.lock();
controls.addEventListener("lock",()=>overlay.style.display="none");
controls.addEventListener("unlock",()=>overlay.style.display="flex");

// ===== INPUT =====
const keys={};let mouseDown=false;
onkeydown=e=>keys[e.code]=true;
onkeyup=e=>keys[e.code]=false;
onmousedown=()=>mouseDown=true;
onmouseup=()=>mouseDown=false;

// ===== CONSTANTS =====
const PLAYER_HEIGHT=1.8,EYE_HEIGHT=1.6,PLAYER_WIDTH=0.3;

// ===== TEXTURES =====
function tex(c){
 const canvas=document.createElement("canvas");
 canvas.width=8;canvas.height=8;
 const ctx=canvas.getContext("2d");
 for(let x=0;x<8;x++)for(let y=0;y<8;y++){
  let s=c+Math.random()*20;
  ctx.fillStyle=`rgb(${s},${s},${s})`;
  ctx.fillRect(x,y,1,1);
 }
 const t=new THREE.CanvasTexture(canvas);
 t.magFilter=t.minFilter=THREE.NearestFilter;
 return t;
}

const mats={
 grass:new THREE.MeshLambertMaterial({map:tex(120)}),
 dirt:new THREE.MeshLambertMaterial({map:tex(100)}),
 stone:new THREE.MeshLambertMaterial({map:tex(80)}),
 wood:new THREE.MeshLambertMaterial({map:tex(140)}),
 leaves:new THREE.MeshLambertMaterial({map:tex(110),transparent:true,opacity:0.8}),
 torch:new THREE.MeshBasicMaterial({color:0xffaa33})
};

const geo=new THREE.BoxGeometry(1,1,1);

// ===== WORLD =====
const world=new Map();
const blocks=new Map();
const key=(x,y,z)=>`${x},${y},${z}`;

// noise
const h=(x,z)=>Math.floor(Math.sin(x*0.1)*4+Math.cos(z*0.1)*4);
const cave=(x,y,z)=>Math.sin(x*0.15)+Math.sin(y*0.15)+Math.cos(z*0.15);

// tree
function tree(x,y,z){
 for(let i=1;i<5;i++){
  place(x,y+i,z,"wood");
 }
 for(let dx=-2;dx<=2;dx++){
 for(let dz=-2;dz<=2;dz++){
 for(let dy=3;dy<=5;dy++){
  if(Math.random()>0.3){
   place(x+dx,y+dy,z+dz,"leaves");
  }
 }}}
}

// place helper
function place(x,y,z,type){
 const k=key(x,y,z);
 if(blocks.has(k)) return;

 const b=new THREE.Mesh(geo,mats[type]);
 b.position.set(x,y,z);
 scene.add(b);

 blocks.set(k,b);
 world.set(k,type);

 if(type==="torch"){
  const light=new THREE.PointLight(0xffaa33,1,10);
  light.position.set(x,y,z);
  scene.add(light);
 }
}

// generate chunk
function genChunk(cx,cz){
 for(let x=0;x<16;x++){
 for(let z=0;z<16;z++){
  const wx=cx*16+x;
  const wz=cz*16+z;
  let top=h(wx,wz);

  for(let y=-10;y<=top;y++){

   if(cave(wx,y,wz)>1.2) continue;

   let t="stone";
   if(y===top) t="grass";
   else if(y>top-3) t="dirt";

   place(wx,y,wz,t);
  }

  if(Math.random()<0.02) tree(wx,top,wz);
 }}
}

// load chunks
function updateChunks(){
 const cx=Math.floor(camera.position.x/16);
 const cz=Math.floor(camera.position.z/16);

 for(let x=-2;x<=2;x++){
 for(let z=-2;z<=2;z++){
  genChunk(cx+x,cz+z);
 }}
}

// ===== COLLISION =====
function collide(px,py,pz){
 for(let x=Math.floor(px-PLAYER_WIDTH);x<=Math.floor(px+PLAYER_WIDTH);x++){
 for(let y=Math.floor(py);y<=Math.floor(py+PLAYER_HEIGHT);y++){
 for(let z=Math.floor(pz-PLAYER_WIDTH);z<=Math.floor(pz+PLAYER_WIDTH);z++){
  if(world.has(key(x,y,z))) return true;
 }}}
 return false;
}

// ===== INVENTORY =====
const inv=["dirt","stone","wood","leaves","torch"];
let slot=0;

addEventListener("wheel",e=>{
 slot=(slot+(e.deltaY>0?1:-1)+inv.length)%inv.length;
});

// HUD
const hud=document.getElementById("hud");

// ===== RAY =====
const ray=new THREE.Raycaster();
let target=null,breakTimer=0;

// outline
const outline=new THREE.LineSegments(
 new THREE.EdgesGeometry(geo),
 new THREE.LineBasicMaterial({color:0x000000})
);
scene.add(outline);
outline.visible=false;

// ===== PHYSICS =====
let velY=0,onGround=false;
const gravity=-0.02,jump=0.35;

camera.position.set(0,20,0);

// ===== CLICK =====
addEventListener("mousedown",e=>{
 if(e.button!==2||!target) return;

 const {pos,normal}=target;
 place(pos.x+normal.x,pos.y+normal.y,pos.z+normal.z,inv[slot]);
});

addEventListener("contextmenu",e=>e.preventDefault());

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 updateChunks();

 const speed=0.15;

 const f=new THREE.Vector3();
 camera.getWorldDirection(f);f.y=0;f.normalize();

 const r=new THREE.Vector3();
 r.crossVectors(f,new THREE.Vector3(0,1,0)).normalize();

 let dx=0,dz=0;
 if(keys["KeyW"]){dx+=f.x*speed;dz+=f.z*speed;}
 if(keys["KeyS"]){dx-=f.x*speed;dz-=f.z*speed;}
 if(keys["KeyA"]){dx-=r.x*speed;dz-=r.z*speed;}
 if(keys["KeyD"]){dx+=r.x*speed;dz+=r.z*speed;}

 let nx=camera.position.x+dx,nz=camera.position.z+dz;

 if(!collide(nx,camera.position.y-EYE_HEIGHT,camera.position.z)) camera.position.x=nx;
 if(!collide(camera.position.x,camera.position.y-EYE_HEIGHT,nz)) camera.position.z=nz;

 velY+=gravity;velY*=0.98;
 let ny=camera.position.y+velY;

 if(velY<=0){
  if(collide(camera.position.x,ny-EYE_HEIGHT,camera.position.z)){
   camera.position.y=Math.floor(ny-EYE_HEIGHT)+EYE_HEIGHT+1;
   velY=0;onGround=true;
  } else {camera.position.y=ny;onGround=false;}
 } else {
  if(!collide(camera.position.x,ny,camera.position.z)) camera.position.y=ny;
  else velY=0;
 }

 // ray
 ray.setFromCamera({x:0,y:0},camera);
 const hits=ray.intersectObjects([...blocks.values()]);

 if(hits.length){
  const h=hits[0];
  const pos=h.object.position.clone();
  const normal=h.face.normal.clone();

  target={pos,normal};
  outline.visible=true;
  outline.position.copy(pos);

  if(mouseDown){
   breakTimer++;
   if(breakTimer>15){
    const k=key(pos.x,pos.y,pos.z);
    scene.remove(blocks.get(k));
    blocks.delete(k);
    world.delete(k);
    breakTimer=0;
   }
  } else breakTimer=0;

 } else {
  outline.visible=false;
  target=null;
  breakTimer=0;
 }

 hud.innerText="Block: "+inv[slot];

 renderer.render(scene,camera);
}
animate();

onresize=()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
};

</script>
</body>
</html>
