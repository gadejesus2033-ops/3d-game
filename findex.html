<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Engine - Fully Fixed</title>

<style>
body { margin:0; overflow:hidden; }
#overlay{
 position:absolute;
 inset:0;
 background:#000;
 color:#fff;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:20px;
 cursor:pointer;
}
</style>
</head>

<body>
<div id="overlay">CLICK TO START</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>
// ================= BASIC SETUP =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(20,30,10);
scene.add(light);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ================= WORLD =================
const geo = new THREE.BoxGeometry(1,1,1);

const mat = {
 grass: new THREE.MeshLambertMaterial({color:0x3cb043}),
 dirt: new THREE.MeshLambertMaterial({color:0x8b5a2b}),
 stone: new THREE.MeshLambertMaterial({color:0x888888})
};

const world = new Map();
const blocks = [];

const key = (x,y,z)=>`${x},${y},${z}`;

function addBlock(x,y,z,type,material){
 const mesh = new THREE.Mesh(geo,material);
 mesh.position.set(x,y,z);
 scene.add(mesh);

 blocks.push(mesh);
 world.set(key(x,y,z), mesh);
}

function removeBlock(x,y,z){
 const k = key(x,y,z);
 const mesh = world.get(k);
 if(!mesh) return;

 scene.remove(mesh);
 world.delete(k);
}

// ================= FLAT WORLD =================
for(let x=-25;x<25;x++){
 for(let z=-25;z<25;z++){
  addBlock(x,-1,z,"grass",mat.grass);
  addBlock(x,-2,z,"dirt",mat.dirt);
 }
}

// ================= PLAYER =================
const player = {
 height: 2,
 width: 0.6,
 depth: 0.6
};

let velY = 0;
let onGround = false;

const gravity = -0.015;
const jumpPower = 0.22;

// ================= COLLISION (REAL VOXEL AABB) =================
function collide(x,y,z){
 const minX = Math.floor(x - player.width/2);
 const maxX = Math.floor(x + player.width/2);

 const minY = Math.floor(y);
 const maxY = Math.floor(y + player.height);

 const minZ = Math.floor(z - player.depth/2);
 const maxZ = Math.floor(z + player.depth/2);

 for(let ix=minX; ix<=maxX; ix++){
  for(let iy=minY; iy<=maxY; iy++){
   for(let iz=minZ; iz<=maxZ; iz++){
    if(world.has(key(ix,iy,iz))) return true;
   }
  }
 }
 return false;
}

// ================= MOVEMENT =================
function move(dx,dz){
 const steps = 5;

 for(let i=0;i<steps;i++){
  let sx = dx/steps;
  let sz = dz/steps;

  let nx = camera.position.x + sx;
  let nz = camera.position.z + sz;

  if(!collide(nx, camera.position.y, camera.position.z)){
   camera.position.x = nx;
  }

  if(!collide(camera.position.x, camera.position.y, nz)){
   camera.position.z = nz;
  }
 }
}

// ================= CONTROLS =================
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

document.getElementById("overlay").onclick = () => {
 document.body.requestPointerLock();
};

document.addEventListener("pointerlockchange", () => {
 document.getElementById("overlay").style.display =
 document.pointerLockElement === document.body ? "none" : "flex";
});

// ================= INPUT =================
const keys = {w:false,a:false,s:false,d:false};

window.onkeydown = e => {
 if(e.code==="KeyW") keys.w=true;
 if(e.code==="KeyA") keys.a=true;
 if(e.code==="KeyS") keys.s=true;
 if(e.code==="KeyD") keys.d=true;

 if(e.code==="Space" && onGround){
  velY = jumpPower;
  onGround = false;
 }
};

window.onkeyup = e => {
 if(e.code==="KeyW") keys.w=false;
 if(e.code==="KeyA") keys.a=false;
 if(e.code==="KeyS") keys.s=false;
 if(e.code==="KeyD") keys.d=false;
};

// ================= RAYCAST =================
const ray = new THREE.Raycaster();

window.addEventListener("mousedown", e => {
 ray.setFromCamera({x:0,y:0}, camera);

 const hit = ray.intersectObjects(blocks);
 if(!hit.length) return;

 const p = hit[0].object.position;

 const x = Math.floor(p.x);
 const y = Math.floor(p.y);
 const z = Math.floor(p.z);

 if(e.button === 0){
  removeBlock(x,y,z);
 }

 if(e.button === 2){
  if(!world.has(key(x,y+1,z))){
   addBlock(x,y+1,z,"stone",mat.stone);
  }
 }
});

window.addEventListener("contextmenu", e => e.preventDefault());

// ================= START POSITION =================
camera.position.set(0,5,5);

// ================= LOOP =================
function animate(){
 requestAnimationFrame(animate);

 const speed = 0.12;

 const dir = new THREE.Vector3();
 camera.getWorldDirection(dir);
 dir.y = 0;
 dir.normalize();

 const right = new THREE.Vector3();
 right.crossVectors(dir, new THREE.Vector3(0,1,0)).normalize();

 let dx = 0, dz = 0;

 if(keys.w){ dx += dir.x * speed; dz += dir.z * speed; }
 if(keys.s){ dx -= dir.x * speed; dz -= dir.z * speed; }
 if(keys.a){ dx -= right.x * speed; dz -= right.z * speed; }
 if(keys.d){ dx += right.x * speed; dz += right.z * speed; }

 move(dx, dz);

 // ================= GRAVITY =================
 velY += gravity;
 camera.position.y += velY;

 const feet = camera.position.y - player.height;

 if(collide(camera.position.x, feet, camera.position.z)){
  camera.position.y = Math.ceil(camera.position.y);
  velY = 0;
  onGround = true;
 }

 renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
 camera.aspect = innerWidth / innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
