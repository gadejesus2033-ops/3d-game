<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Game Auto Start</title>

<style>
body{margin:0;overflow:hidden;background:black;}
#overlay{
 position:absolute;inset:0;
 display:flex;align-items:center;justify-content:center;
 color:white;font-family:sans-serif;
 background:black;
}
#crosshair{
 position:fixed;left:50%;top:50%;
 width:10px;height:10px;
 transform:translate(-50%,-50%);
}
#crosshair:before,#crosshair:after{
 content:"";position:absolute;background:white;
}
#crosshair:before{width:10px;height:2px;top:4px;}
#crosshair:after{width:2px;height:10px;left:4px;}
</style>
</head>

<body>

<div id="overlay">Loading... (click if it doesn’t start)</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ===== SCENE =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.8));

// ===== CONTROLS =====
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

const overlay=document.getElementById("overlay");

// try auto start
setTimeout(()=>{
 tryLock();
},200);

// fallback click
document.addEventListener("click", tryLock);

function tryLock(){
 if(!controls.isLocked){
  controls.lock();
 }
}

controls.addEventListener("lock",()=>{
 overlay.style.display="none";
});

controls.addEventListener("unlock",()=>{
 overlay.style.display="flex";
 overlay.innerText="Click to resume";
});

// ===== INPUT =====
const keys={},breaking=false;

onkeydown=e=>keys[e.code]=true;
onkeyup=e=>keys[e.code]=false;

// ===== CONSTANTS =====
const HEIGHT=1.8,EYE=1.6,WIDTH=0.3;

// ===== BLOCK =====
const geo=new THREE.BoxGeometry(1,1,1);
const mat=new THREE.MeshLambertMaterial({color:0x55aa55});

// ===== WORLD =====
const SIZE=50,HALF=SIZE/2;
const world=new Map();
const meshes=new Map();

const key=(x,y,z)=>`${x},${y},${z}`;

function add(x,y,z){
 const k=key(x,y,z);
 const m=new THREE.Mesh(geo,mat);
 m.position.set(x,y,z);
 scene.add(m);
 world.set(k,1);
 meshes.set(k,m);
}

for(let x=-HALF;x<HALF;x++){
 for(let z=-HALF;z<HALF;z++){
  for(let y=0;y<3;y++){
   add(x,y,z);
  }
 }
}

// ===== COLLISION =====
function collide(px,py,pz){
 for(let x=Math.floor(px-WIDTH);x<=Math.floor(px+WIDTH);x++)
 for(let y=Math.floor(py);y<=Math.floor(py+HEIGHT);y++)
 for(let z=Math.floor(pz-WIDTH);z<=Math.floor(pz+WIDTH);z++)
  if(world.has(key(x,y,z))) return true;
 return false;
}

// ===== PHYSICS =====
let vy=0,onGround=false;
const gravity=-0.02,jump=0.35;

camera.position.set(0,5,5);

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed=0.15;

 const f=new THREE.Vector3();
 camera.getWorldDirection(f);f.y=0;f.normalize();

 const r=new THREE.Vector3();
 r.crossVectors(f,new THREE.Vector3(0,1,0)).normalize();

 let nx=camera.position.x,nz=camera.position.z;

 if(keys["KeyW"]){nx+=f.x*speed;nz+=f.z*speed;}
 if(keys["KeyS"]){nx-=f.x*speed;nz-=f.z*speed;}
 if(keys["KeyA"]){nx-=r.x*speed;nz-=r.z*speed;}
 if(keys["KeyD"]){nx+=r.x*speed;nz+=r.z*speed;}

 if(!collide(nx,camera.position.y-EYE,camera.position.z)) camera.position.x=nx;
 if(!collide(camera.position.x,camera.position.y-EYE,nz)) camera.position.z=nz;

 vy+=gravity;
 let ny=camera.position.y+vy;

 if(vy<=0){
  if(collide(camera.position.x,ny-EYE,camera.position.z)){
   camera.position.y=Math.floor(ny-EYE)+EYE+1;
   vy=0;onGround=true;
  } else camera.position.y=ny;
 } else camera.position.y=ny;

 if(keys["Space"]&&onGround){vy=jump;onGround=false;}

 renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
