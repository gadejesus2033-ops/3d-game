<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fixed Voxel Engine (Stable)</title>

<style>
body { margin:0; overflow:hidden; }
#overlay{
 position:absolute;
 inset:0;
 background:black;
 color:white;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:20px;
}
</style>
</head>

<body>
<div id="overlay">CLICK TO START</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(20, 30, 10);
scene.add(sun);

// ================= CAMERA =================
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ================= WORLD =================
const geo = new THREE.BoxGeometry(1,1,1);

const mat = {
 grass: new THREE.MeshLambertMaterial({color:0x3cb043}),
 dirt:  new THREE.MeshLambertMaterial({color:0x8b5a2b}),
 stone: new THREE.MeshLambertMaterial({color:0x888888}),
 wood:  new THREE.MeshLambertMaterial({color:0x8b4513}),
 leaves:new THREE.MeshLambertMaterial({color:0x2ecc71})
};

const world = new Map();
const blockMeshes = [];

function key(x,y,z){
 return `${x},${y},${z}`;
}

class Block{
 constructor(x,y,z,type,mesh){
  this.x=x; this.y=y; this.z=z;
  this.type=type;
  this.mesh=mesh;
 }
}

// ================= BLOCK SYSTEM =================
function addBlock(x,y,z,type,material){
 const mesh = new THREE.Mesh(geo, material);
 mesh.position.set(x,y,z);
 scene.add(mesh);

 blockMeshes.push(mesh);
 world.set(key(x,y,z), new Block(x,y,z,type,mesh));
}

function removeBlock(x,y,z){
 const k = key(x,y,z);
 const b = world.get(k);
 if(!b) return;

 scene.remove(b.mesh);
 world.delete(k);
}

// IMPORTANT: strict voxel lookup
function getBlock(x,y,z){
 return world.get(key(Math.floor(x),Math.floor(y),Math.floor(z)));
}

// ================= WORLD GEN =================
for(let x=-20;x<20;x++){
 for(let z=-20;z<20;z++){
  addBlock(x,-1,z,"grass",mat.grass);
  addBlock(x,-2,z,"dirt",mat.dirt);
 }
}

function mountain(cx,cz){
 for(let x=-8;x<=8;x++){
  for(let z=-8;z<=8;z++){
   const d = Math.sqrt(x*x+z*z);
   const h = Math.floor(6-d);
   if(h>0){
    for(let y=0;y<h;y++){
     addBlock(cx+x,y,cz+z,"stone",mat.stone);
    }
   }
  }
 }
}

mountain(0,-25);
mountain(0,25);
mountain(-25,0);
mountain(25,0);

function tree(x,z){
 for(let i=0;i<4;i++) addBlock(x,i,z,"wood",mat.wood);

 for(let lx=-2;lx<=2;lx++){
  for(let lz=-2;lz<=2;lz++){
   for(let ly=3;ly<=5;ly++){
    if(Math.abs(lx)+Math.abs(lz)<4){
     addBlock(x+lx,ly,z+lz,"leaves",mat.leaves);
    }
   }
  }
 }
}

tree(5,5);
tree(-5,-5);

// ================= CONTROLS =================
const controls = new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

document.getElementById("overlay").onclick=()=>{
 document.body.requestPointerLock();
};

document.addEventListener("pointerlockchange",()=>{
 document.getElementById("overlay").style.display =
 document.pointerLockElement===document.body ? "none":"flex";
});

// ================= INPUT =================
const keys={w:false,a:false,s:false,d:false};

window.onkeydown=e=>{
 if(e.code==="KeyW")keys.w=true;
 if(e.code==="KeyS")keys.s=true;
 if(e.code==="KeyA")keys.a=true;
 if(e.code==="KeyD")keys.d=true;

 if(e.code==="Space" && onGround){
  velocityY = jumpPower;
  onGround = false;
 }
};

window.onkeyup=e=>{
 if(e.code==="KeyW")keys.w=false;
 if(e.code==="KeyS")keys.s=false;
 if(e.code==="KeyA")keys.a=false;
 if(e.code==="KeyD")keys.d=false;
};

// ================= PLAYER PHYSICS =================
let velocityY=0;
const gravity=-0.01;
const jumpPower=0.2;
let onGround=false;

const player = {w:0.6,h:2,d:0.6};

// ================= COLLISION =================
function collides(x,y,z){
 const minX = Math.floor(x - player.w/2);
 const maxX = Math.floor(x + player.w/2);

 const minY = Math.floor(y);
 const maxY = Math.floor(y + player.h);

 const minZ = Math.floor(z - player.d/2);
 const maxZ = Math.floor(z + player.d/2);

 for(let ix=minX; ix<=maxX; ix++){
  for(let iy=minY; iy<=maxY; iy++){
   for(let iz=minZ; iz<=maxZ; iz++){
    if(world.has(key(ix,iy,iz))){
     return true;
    }
   }
  }
 }
 return false;
}

// ================= MOVE =================
function move(dx,dz){
 const nx = camera.position.x + dx;
 const nz = camera.position.z + dz;

 if(!collides(nx,camera.position.y,camera.position.z)){
  camera.position.x = nx;
 }

 if(!collides(camera.position.x,camera.position.y,nz)){
  camera.position.z = nz;
 }
}

// ================= RAYCAST =================
const raycaster = new THREE.Raycaster();

window.addEventListener("mousedown",(e)=>{
 raycaster.setFromCamera({x:0,y:0},camera);

 const hits = raycaster.intersectObjects(blockMeshes);
 if(!hits.length) return;

 const pos = hits[0].object.position;

 const x = Math.floor(pos.x);
 const y = Math.floor(pos.y);
 const z = Math.floor(pos.z);

 if(e.button===0){
  removeBlock(x,y,z);
 }

 if(e.button===2){
  if(!getBlock(x,y+1,z)){
   addBlock(x,y+1,z,"stone",mat.stone);
  }
 }
});

window.addEventListener("contextmenu",e=>e.preventDefault());

// ================= START POSITION =================
camera.position.set(0,10,5);

// ================= LOOP =================
function animate(){
 requestAnimationFrame(animate);

 const speed = 0.1;

 const forward = new THREE.Vector3();
 camera.getWorldDirection(forward);
 forward.y = 0;
 forward.normalize();

 const right = new THREE.Vector3();
 right.crossVectors(forward,new THREE.Vector3(0,1,0)).normalize();

 let dx=0,dz=0;

 if(keys.w){dx += forward.x*speed; dz += forward.z*speed;}
 if(keys.s){dx -= forward.x*speed; dz -= forward.z*speed;}
 if(keys.a){dx -= right.x*speed; dz -= right.z*speed;}
 if(keys.d){dx += right.x*speed; dz += right.z*speed;}

 move(dx,dz);

 // gravity
 velocityY += gravity;
 camera.position.y += velocityY;

 // ground collision (FIXED)
 const feet = camera.position.y - 1.9;

 if(collides(camera.position.x, feet, camera.position.z)){
  camera.position.y = Math.ceil(camera.position.y);
  velocityY = 0;
  onGround = true;
 }

 renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
 camera.aspect = innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
