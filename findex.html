<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arrow Key Movement</title>
<style>
body { margin:0; overflow:hidden; }
#overlay {
 position:absolute; inset:0;
 background:black; color:white;
 display:flex; align-items:center; justify-content:center;
}
</style>
</head>
<body tabindex="0">

<div id="overlay">CLICK TO START</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>
// ===== BASIC SETUP =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// light
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

// ground
const ground = new THREE.Mesh(
 new THREE.BoxGeometry(50,1,50),
 new THREE.MeshLambertMaterial({color:0x00aa00})
);
ground.position.y = -1;
scene.add(ground);

// ===== CONTROLS =====
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const overlay = document.getElementById('overlay');

overlay.onclick = ()=>{
 document.body.focus();
 document.body.requestPointerLock();
};

document.addEventListener('pointerlockchange', ()=>{
 if(document.pointerLockElement === document.body){
  overlay.style.display = 'none';
 } else {
  overlay.style.display = 'flex';
 }
});

// ===== INPUT =====
let forward = false;

window.onkeydown = (e)=>{
 if(e.code === 'ArrowUp'){
  forward = true;
  console.log("UP pressed");
 }
};

window.onkeyup = (e)=>{
 if(e.code === 'ArrowUp'){
  forward = false;
 }
};

// start position
camera.position.set(0,2,5);

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed = 0.1;
 const angle = camera.rotation.y;

 if(forward){
  camera.position.x += -Math.sin(angle) * speed;
  camera.position.z += -Math.cos(angle) * speed;
 }

 renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
