<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Terrain Upgrade</title>

<style>
body { margin:0; overflow:hidden; }
#overlay{
 position:absolute;
 inset:0;
 background:black;
 color:white;
 display:flex;
 align-items:center;
 justify-content:center;
 cursor:pointer;
}
#crosshair{
 position:fixed;
 left:50%;
 top:50%;
 width:10px;
 height:10px;
 transform:translate(-50%,-50%);
}
#crosshair:before,#crosshair:after{
 content:"";
 position:absolute;
 background:white;
}
#crosshair:before{width:10px;height:2px;top:4px;}
#crosshair:after{width:2px;height:10px;left:4px;}
</style>
</head>

<body>

<div id="overlay">CLICK TO START</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ================= BASIC SETUP =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(20,30,10);
scene.add(light);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// ================= BLOCK SYSTEM =================
const geo = new THREE.BoxGeometry(1,1,1);

const mat = {
 grass:new THREE.MeshLambertMaterial({color:0x3cb043}),
 dirt:new THREE.MeshLambertMaterial({color:0x8b5a2b}),
 stone:new THREE.MeshLambertMaterial({color:0x888888})
};

const world = new Map();

function key(x,y,z){ return `${x},${y},${z}`; }

function add(x,y,z,m){
 const mesh=new THREE.Mesh(geo,m);
 mesh.position.set(x,y,z);
 scene.add(mesh);
 world.set(key(x,y,z),1);
}

// ================= REALISTIC TERRAIN =================

// smoother noise (multi-octave style)
function noise(x,z){

 let total = 0;
 let freq = 0.05;
 let amp = 1;
 let max = 0;

 for(let i=0;i<4;i++){
  total += (Math.sin(x*freq) + Math.cos(z*freq)) * amp;
  max += amp;

  amp *= 0.5;
  freq *= 2;
 }

 return total / max;
}

// generate terrain
for(let x=-80;x<80;x++){
 for(let z=-80;z<80;z++){

  let height = Math.floor(noise(x,z) * 10);

  for(let y=-10;y<=height;y++){

   if(y === height){
    add(x,y,z,mat.grass);
   }
   else if(y > height-3){
    add(x,y,z,mat.dirt);
   }
   else{
    add(x,y,z,mat.stone);
   }

  }

 }
}

// ================= CONTROLS =================
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

overlay.onclick=()=>document.body.requestPointerLock();

document.addEventListener("pointerlockchange",()=>{
 overlay.style.display=document.pointerLockElement?"none":"flex";
});

// ================= SIMPLE MOVEMENT =================
const keys={w:false,a:false,s:false,d:false};

onkeydown=e=>{
 if(e.code==="KeyW")keys.w=true;
 if(e.code==="KeyA")keys.a=true;
 if(e.code==="KeyS")keys.s=true;
 if(e.code==="KeyD")keys.d=true;
};

onkeyup=e=>{
 if(e.code==="KeyW")keys.w=false;
 if(e.code==="KeyA")keys.a=false;
 if(e.code==="KeyS")keys.s=false;
 if(e.code==="KeyD")keys.d=false;
};

camera.position.set(0,10,5);

// ================= LOOP =================
function animate(){
 requestAnimationFrame(animate);

 const speed=0.15;

 const dir=new THREE.Vector3();
 camera.getWorldDirection(dir);
 dir.y=0;
 dir.normalize();

 const right=new THREE.Vector3();
 right.crossVectors(dir,new THREE.Vector3(0,1,0)).normalize();

 if(keys.w) camera.position.addScaledVector(dir,speed);
 if(keys.s) camera.position.addScaledVector(dir,-speed);
 if(keys.a) camera.position.addScaledVector(right,-speed);
 if(keys.d) camera.position.addScaledVector(right,speed);

 renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
