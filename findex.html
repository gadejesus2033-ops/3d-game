<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fixed Voxel Engine</title>

<style>
body { margin:0; overflow:hidden; }
#overlay {
 position:absolute; inset:0;
 background:black;
 color:white;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:20px;
}
</style>
</head>

<body>
<div id="overlay">CLICK TO START</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>
// ================= LIGHTING FIX =================
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

scene.add(new THREE.AmbientLight(0xffffff,0.6));

const sun=new THREE.DirectionalLight(0xffffff,1);
sun.position.set(20,30,10);
scene.add(sun);

// ================= CAMERA =================
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// ================= MATERIALS =================
const mat={
 grass:new THREE.MeshLambertMaterial({color:0x3cb043}),
 dirt:new THREE.MeshLambertMaterial({color:0x8b5a2b}),
 stone:new THREE.MeshLambertMaterial({color:0x888888}),
 wood:new THREE.MeshLambertMaterial({color:0x8b4513}),
 leaves:new THREE.MeshLambertMaterial({color:0x2ecc71})
};

// ================= WORLD =================
const world=new Map();
const geo=new THREE.BoxGeometry(1,1,1);

function key(x,y,z){return `${x},${y},${z}`;}

class Block{
 constructor(x,y,z,mesh){
  this.x=x;
  this.y=y;
  this.z=z;
  this.mesh=mesh;
  this.solid=true;
 }
}

function addBlock(x,y,z,m){
 const mesh=new THREE.Mesh(geo,m);
 mesh.position.set(x,y,z);
 scene.add(mesh);

 world.set(key(x,y,z),new Block(x,y,z,mesh));
}

function getBlock(x,y,z){
 return world.get(key(Math.round(x),Math.floor(y),Math.round(z)));
}

// ================= WORLD GEN =================
for(let x=-25;x<25;x++){
 for(let z=-25;z<25;z++){
  addBlock(x,-1,z,mat.grass);
  addBlock(x,-2,z,mat.dirt);
 }
}

// mountains (FIXED collision support)
function mountain(cx,cz){
 for(let x=-10;x<=10;x++){
  for(let z=-10;z<=10;z++){
   const d=Math.sqrt(x*x+z*z);
   const h=Math.floor(8-d);

   if(h>0){
    for(let y=0;y<h;y++){
     addBlock(cx+x,y,cz+z,mat.stone);
    }
   }
  }
 }
}

mountain(0,-30);
mountain(0,30);
mountain(-30,0);
mountain(30,0);

// trees
function tree(x,z){
 for(let i=0;i<4;i++) addBlock(x,i,z,mat.wood);

 for(let lx=-2;lx<=2;lx++){
  for(let lz=-2;lz<=2;lz++){
   for(let ly=3;ly<=5;ly++){
    if(Math.abs(lx)+Math.abs(lz)<4){
     addBlock(x+lx,ly,z+lz,mat.leaves);
    }
   }
  }
 }
}

tree(5,5);
tree(-5,-5);
tree(10,-10);
tree(-10,10);

// ================= CONTROLS =================
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

document.getElementById("overlay").onclick=()=>{
 document.body.requestPointerLock();
};

document.addEventListener("pointerlockchange",()=>{
 document.getElementById("overlay").style.display=
 document.pointerLockElement===document.body?"none":"flex";
});

// ================= INPUT =================
const keys={up:false,down:false,left:false,right:false};

let velocityY=0;
const gravity=-0.01;
const jumpPower=0.2;
let onGround=false;

const player={width:0.6,height:2,depth:0.6};

// ================= COLLISION (FIXED PROPERLY) =================
function collides(x,y,z){
 const minX=x-player.width/2;
 const maxX=x+player.width/2;

 const minY=y;
 const maxY=y+player.height;

 const minZ=z-player.depth/2;
 const maxZ=z+player.depth/2;

 for(let ix=Math.floor(minX);ix<=Math.floor(maxX);ix++){
  for(let iy=Math.floor(minY);iy<=Math.floor(maxY);iy++){
   for(let iz=Math.floor(minZ);iz<=Math.floor(maxZ);iz++){
    const b=getBlock(ix,iy,iz);
    if(b) return true;
   }
  }
 }
 return false;
}

// ================= MOVEMENT (NO TUNNELING FIX) =================
function move(dx,dz){
 const steps=10;

 for(let i=0;i<steps;i++){
  let sx=dx/steps;
  let sz=dz/steps;

  let nx=camera.position.x+sx;
  let nz=camera.position.z+sz;

  if(!collides(nx,camera.position.y,camera.position.z)){
   camera.position.x=nx;
  }

  if(!collides(camera.position.x,camera.position.y,nz)){
   camera.position.z=nz;
  }
 }
}

// ================= INPUT =================
window.onkeydown=e=>{
 if(e.code==="ArrowUp")keys.up=true;
 if(e.code==="ArrowDown")keys.down=true;
 if(e.code==="ArrowLeft")keys.left=true;
 if(e.code==="ArrowRight")keys.right=true;

 if(e.code==="Space"&&onGround){
  velocityY=jumpPower;
  onGround=false;
 }
};

window.onkeyup=e=>{
 if(e.code==="ArrowUp")keys.up=false;
 if(e.code==="ArrowDown")keys.down=false;
 if(e.code==="ArrowLeft")keys.left=false;
 if(e.code==="ArrowRight")keys.right=false;
};

// ================= LOOP =================
camera.position.set(0,3,5);

function animate(){
 requestAnimationFrame(animate);

 const speed=0.1;

 const forward=new THREE.Vector3();
 camera.getWorldDirection(forward);
 forward.y=0;
 forward.normalize();

 const right=new THREE.Vector3();
 right.crossVectors(forward,new THREE.Vector3(0,1,0)).normalize();

 let mx=0,mz=0;

 if(keys.up){mx+=forward.x*speed;mz+=forward.z*speed;}
 if(keys.down){mx-=forward.x*speed;mz-=forward.z*speed;}
 if(keys.left){mx-=right.x*speed;mz-=right.z*speed;}
 if(keys.right){mx+=right.x*speed;mz+=right.z*speed;}

 move(mx,mz);

// gravity
 velocityY+=gravity;
 camera.position.y+=velocityY;

 if(camera.position.y<=2){
  camera.position.y=2;
  velocityY=0;
  onGround=true;
 }

 renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
