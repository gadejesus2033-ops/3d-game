<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Engine - Clean Minecraft Movement</title>

<style>
body{margin:0;overflow:hidden;background:#000;}
#overlay{
 position:absolute;inset:0;display:flex;
 align-items:center;justify-content:center;
 color:white;background:#000;cursor:pointer;
}
</style>
</head>

<body>
<div id="overlay">CLICK TO START</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ===== BASIC SETUP =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// ===== PLAYER =====
const player = {
 width:0.6,
 height:1.8,
 depth:0.6
};

let velY = 0;
let onGround = false;

const gravity = -0.015;
const jump = 0.25;

// ===== WORLD =====
const world = new Map();
const key = (x,y,z)=>`${x},${y},${z}`;

// simple flat world
for(let x=-20;x<20;x++){
 for(let z=-20;z<20;z++){
  for(let y=-3;y<0;y++){
   world.set(key(x,y,z),1);
  }
 }
}

// ===== BLOCK MESH =====
const geo = new THREE.BoxGeometry(1,1,1);
const mat = new THREE.MeshLambertMaterial({color:0x3cb043});

for(let k of world.keys()){
 const [x,y,z]=k.split(",").map(Number);
 const m=new THREE.Mesh(geo,mat);
 m.position.set(x,y,z);
 scene.add(m);
}

// ===== COLLISION =====
function collide(px,py,pz){

 const hw=player.width/2;
 const hd=player.depth/2;

 const minX=Math.floor(px-hw);
 const maxX=Math.floor(px+hw);
 const minY=Math.floor(py-player.height+0.001);
 const maxY=Math.floor(py-0.001);
 const minZ=Math.floor(pz-hd);
 const maxZ=Math.floor(pz+hd);

 for(let x=minX;x<=maxX;x++){
  for(let y=minY;y<=maxY;y++){
   for(let z=minZ;z<=maxZ;z++){
    if(world.has(key(x,y,z))) return true;
   }
  }
 }
 return false;
}

// ===== MOVEMENT =====
function move(dx,dz){

 const steps=4;

 for(let i=0;i<steps;i++){

  let sx=dx/steps;
  let sz=dz/steps;

  // X
  let nx=camera.position.x+sx;
  if(!collide(nx,camera.position.y,camera.position.z)){
   camera.position.x=nx;
  }

  // Z
  let nz=camera.position.z+sz;
  if(!collide(camera.position.x,camera.position.y,nz)){
   camera.position.z=nz;
  }
 }
}

// ===== GRAVITY =====
function applyGravity(){

 velY+=gravity;

 let steps=Math.ceil(Math.abs(velY)/0.1);
 let stepY=velY/steps;

 onGround=false;

 for(let i=0;i<steps;i++){

  let ny=camera.position.y+stepY;

  if(stepY<=0){
   if(collide(camera.position.x,ny,camera.position.z)){
    camera.position.y=Math.floor(camera.position.y);
    velY=0;
    onGround=true;
    break;
   } else {
    camera.position.y=ny;
   }
  } else {
   if(collide(camera.position.x,ny,camera.position.z)){
    velY=0;
    break;
   } else {
    camera.position.y=ny;
   }
  }
 }
}

// ===== CONTROLS =====
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

overlay.onclick=()=>document.body.requestPointerLock();

// ===== INPUT =====
const k={w:0,a:0,s:0,d:0};

onkeydown=e=>{
 if(e.code==="KeyW")k.w=1;
 if(e.code==="KeyS")k.s=1;
 if(e.code==="KeyA")k.a=1;
 if(e.code==="KeyD")k.d=1;

 if(e.code==="Space" && onGround){
  velY=jump;
 }
};

onkeyup=e=>{
 if(e.code==="KeyW")k.w=0;
 if(e.code==="KeyS")k.s=0;
 if(e.code==="KeyA")k.a=0;
 if(e.code==="KeyD")k.d=0;
};

// ===== START =====
camera.position.set(0,3,5);

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed=0.12;

 const dir=new THREE.Vector3();
 camera.getWorldDirection(dir);
 dir.y=0;
 dir.normalize();

 const right=new THREE.Vector3();
 right.crossVectors(dir,new THREE.Vector3(0,1,0)).normalize();

 let dx=0,dz=0;

 if(k.w){dx+=dir.x*speed;dz+=dir.z*speed;}
 if(k.s){dx-=dir.x*speed;dz-=dir.z*speed;}
 if(k.a){dx-=right.x*speed;dz-=right.z*speed;}
 if(k.d){dx+=right.x*speed;dz+=right.z*speed;}

 move(dx,dz);
 applyGravity();

 renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
