<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Engine - Entity System</title>

<style>
body { margin:0; overflow:hidden; }
#overlay {
 position:absolute; inset:0;
 background:black;
 color:white;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:20px;
}
</style>
</head>

<body tabindex="0">
<div id="overlay">CLICK TO START</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>
// ================= TEXTURES =================
function tex(c1,c2){
 const c=document.createElement("canvas");
 c.width=16;c.height=16;
 const ctx=c.getContext("2d");

 for(let x=0;x<16;x++){
  for(let y=0;y<16;y++){
   ctx.fillStyle=Math.random()>0.5?c1:c2;
   ctx.fillRect(x,y,1,1);
  }
 }

 const t=new THREE.CanvasTexture(c);
 t.magFilter=THREE.NearestFilter;
 return t;
}

const grass=new THREE.MeshLambertMaterial({map:tex("#3cb043","#2e8b3c")});
const dirt=new THREE.MeshLambertMaterial({map:tex("#8b5a2b","#6e4420")});
const stone=new THREE.MeshLambertMaterial({map:tex("#888","#666")});
const wood=new THREE.MeshLambertMaterial({map:tex("#a0522d","#7b3f00")});
const leaves=new THREE.MeshLambertMaterial({map:tex("#2ecc71","#27ae60")});

// ================= SCENE =================
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

// ================= WORLD =================
const world=new Map();
const geo=new THREE.BoxGeometry(1,1,1);

function key(x,y,z){
 return `${x},${y},${z}`;
}

const BLOCK={
 GRASS:"grass",
 DIRT:"dirt",
 STONE:"stone",
 WOOD:"wood",
 LEAVES:"leaves"
};

// ================= BLOCK ENTITY =================
class BlockEntity{
 constructor(x,y,z,type,mesh,solid=true){
  this.x=x;
  this.y=y;
  this.z=z;
  this.type=type;
  this.mesh=mesh;
  this.solid=solid;
  this.health=1;
 }
}

function addBlock(x,y,z,type,mat){
 const mesh=new THREE.Mesh(geo,mat);
 mesh.position.set(x,y,z);
 scene.add(mesh);

 const entity=new BlockEntity(x,y,z,type,mesh,true);
 world.set(key(x,y,z),entity);
}

function getBlock(x,y,z){
 return world.get(key(Math.round(x),Math.floor(y),Math.round(z)));
}

// ================= WORLD GENERATION =================

// ground
for(let x=-25;x<25;x++){
 for(let z=-25;z<25;z++){
  addBlock(x,-1,z,BLOCK.GRASS,grass);
  addBlock(x,-2,z,BLOCK.DIRT,dirt);
 }
}

// trees
function tree(x,z){
 for(let i=0;i<4;i++){
  addBlock(x,i,z,BLOCK.WOOD,wood);
 }

 for(let lx=-2;lx<=2;lx++){
  for(let lz=-2;lz<=2;lz++){
   for(let ly=3;ly<=5;ly++){
    if(Math.abs(lx)+Math.abs(lz)<4){
     addBlock(x+lx,ly,z+lz,BLOCK.LEAVES,leaves);
    }
   }
  }
 }
}

tree(5,5);
tree(-5,-5);
tree(10,-10);
tree(-10,10);

// mountains
function mountain(cx,cz){
 for(let x=-10;x<=10;x++){
  for(let z=-10;z<=10;z++){
   const d=Math.sqrt(x*x+z*z);
   const h=Math.floor(8-d);

   if(h>0){
    for(let y=0;y<h;y++){
     addBlock(cx+x,y,cz+z,BLOCK.STONE,stone);
    }
   }
  }
 }
}

mountain(0,-30);
mountain(0,30);
mountain(-30,0);
mountain(30,0);

// ================= CONTROLS =================
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

document.getElementById("overlay").onclick=()=>{
 document.body.requestPointerLock();
};

document.addEventListener("pointerlockchange",()=>{
 document.getElementById("overlay").style.display=
 document.pointerLockElement===document.body?"none":"flex";
});

// ================= INPUT =================
const keys={up:false,down:false,left:false,right:false};

let velocityY=0;
const gravity=-0.01;
const jumpPower=0.2;
let onGround=false;

window.onkeydown=e=>{
 if(e.code==="ArrowUp")keys.up=true;
 if(e.code==="ArrowDown")keys.down=true;
 if(e.code==="ArrowLeft")keys.left=true;
 if(e.code==="ArrowRight")keys.right=true;

 if(e.code==="Space" && onGround){
  velocityY=jumpPower;
  onGround=false;
 }
};

window.onkeyup=e=>{
 if(e.code==="ArrowUp")keys.up=false;
 if(e.code==="ArrowDown")keys.down=false;
 if(e.code==="ArrowLeft")keys.left=false;
 if(e.code==="ArrowRight")keys.right=false;
};

// ================= COLLISION =================
function blocked(x,y,z){
 const px=Math.round(x);
 const pz=Math.round(z);

 for(let dx=-0.3;dx<=0.3;dx+=0.3){
  for(let dz=-0.3;dz<=0.3;dz+=0.3){
   for(let h=0;h<2;h++){
    const b=getBlock(px+dx,y+h,pz+dz);
    if(b && b.solid) return true;
   }
  }
 }
 return false;
}

// ================= LOOP =================
camera.position.set(0,3,5);

function animate(){
 requestAnimationFrame(animate);

 const speed=0.1;

 const forward=new THREE.Vector3();
 camera.getWorldDirection(forward);
 forward.y=0;
 forward.normalize();

 const right=new THREE.Vector3();
 right.crossVectors(forward,new THREE.Vector3(0,1,0)).normalize();

 let mx=0,mz=0;

 if(keys.up){mx+=forward.x*speed;mz+=forward.z*speed;}
 if(keys.down){mx-=forward.x*speed;mz-=forward.z*speed;}
 if(keys.left){mx-=right.x*speed;mz-=right.z*speed;}
 if(keys.right){mx+=right.x*speed;mz+=right.z*speed;}

// X movement
let nx=camera.position.x+mx;
if(!blocked(nx,camera.position.y,camera.position.z)){
 camera.position.x=nx;
}

// Z movement
let nz=camera.position.z+mz;
if(!blocked(camera.position.x,camera.position.y,nz)){
 camera.position.z=nz;
}

// gravity + jump
velocityY+=gravity;
camera.position.y+=velocityY;

if(camera.position.y<=2){
 camera.position.y=2;
 velocityY=0;
 onGround=true;
}

renderer.render(scene,camera);
}
animate();

// resize
window.addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
