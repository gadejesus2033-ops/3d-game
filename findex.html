<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Single File Minecraft Style</title>

<style>
body { margin:0; overflow:hidden; }
#overlay {
 position:absolute; inset:0;
 background:black; color:white;
 display:flex; align-items:center; justify-content:center;
}
</style>
</head>

<body tabindex="0">

<div id="overlay">CLICK TO START</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>
// ===== TEXTURE GENERATOR (16x16 pixel style) =====
function makeTexture(color1, color2){
 const size = 16;
 const canvas = document.createElement('canvas');
 canvas.width = size;
 canvas.height = size;
 const ctx = canvas.getContext('2d');

 for(let x=0;x<size;x++){
  for(let y=0;y<size;y++){
   ctx.fillStyle = Math.random() > 0.5 ? color1 : color2;
   ctx.fillRect(x,y,1,1);
  }
 }

 const tex = new THREE.CanvasTexture(canvas);
 tex.magFilter = THREE.NearestFilter;
 return tex;
}

// materials
const texGrass  = new THREE.MeshLambertMaterial({map: makeTexture("#3cb043","#2e8b3c")});
const texDirt   = new THREE.MeshLambertMaterial({map: makeTexture("#8b5a2b","#6e4420")});
const texStone  = new THREE.MeshLambertMaterial({map: makeTexture("#888","#666")});
const texWood   = new THREE.MeshLambertMaterial({map: makeTexture("#a0522d","#7b3f00")});
const texLeaves = new THREE.MeshLambertMaterial({map: makeTexture("#2ecc71","#27ae60")});

// ===== SETUP =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

// ===== BLOCK =====
function block(x,y,z,mat){
 const mesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), mat);
 mesh.position.set(x,y,z);
 scene.add(mesh);
}

// ===== GROUND =====
for(let x=-25;x<25;x++){
 for(let z=-25;z<25;z++){
  block(x,-1,z,texGrass);
  block(x,-2,z,texDirt);
 }
}

// ===== TREES =====
function createTree(x,z){

 for(let i=0;i<4;i++){
  block(x,i,z,texWood);
 }

 for(let lx=-2;lx<=2;lx++){
  for(let lz=-2;lz<=2;lz++){
   for(let ly=3;ly<=5;ly++){
    if(Math.abs(lx)+Math.abs(lz)<4){
     block(x+lx,ly,z+lz,texLeaves);
    }
   }
  }
 }
}

// place trees
createTree(5,5);
createTree(-5,-5);
createTree(10,-10);
createTree(-10,10);

// ===== MOUNTAINS =====
function createMountain(cx,cz){
 for(let x=-10;x<=10;x++){
  for(let z=-10;z<=10;z++){
   const dist = Math.sqrt(x*x+z*z);
   const h = Math.floor(8 - dist);

   if(h>0){
    for(let y=0;y<h;y++){
     block(cx+x,y,cz+z,texStone);
    }
   }
  }
 }
}

// around center
createMountain(0,-30);
createMountain(0,30);
createMountain(-30,0);
createMountain(30,0);

// ===== CONTROLS =====
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const overlay = document.getElementById('overlay');

overlay.onclick = ()=>{
 document.body.focus();
 document.body.requestPointerLock();
};

document.addEventListener('pointerlockchange', ()=>{
 overlay.style.display =
  document.pointerLockElement === document.body ? 'none' : 'flex';
});

// ===== INPUT =====
const keys = {up:false,down:false,left:false,right:false};

window.onkeydown = e=>{
 if(e.code==='ArrowUp') keys.up=true;
 if(e.code==='ArrowDown') keys.down=true;
 if(e.code==='ArrowLeft') keys.left=true;
 if(e.code==='ArrowRight') keys.right=true;
};

window.onkeyup = e=>{
 if(e.code==='ArrowUp') keys.up=false;
 if(e.code==='ArrowDown') keys.down=false;
 if(e.code==='ArrowLeft') keys.left=false;
 if(e.code==='ArrowRight') keys.right=false;
};

// start
camera.position.set(0,3,5);

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed = 0.1;

 const forward = new THREE.Vector3();
 camera.getWorldDirection(forward);
 forward.y = 0;
 forward.normalize();

 const right = new THREE.Vector3();
 right.crossVectors(forward, new THREE.Vector3(0,1,0)).normalize();

 let mx=0, mz=0;

 if(keys.up){ mx+=forward.x*speed; mz+=forward.z*speed; }
 if(keys.down){ mx-=forward.x*speed; mz-=forward.z*speed; }
 if(keys.left){ mx-=right.x*speed; mz-=right.z*speed; }
 if(keys.right){ mx+=right.x*speed; mz+=right.z*speed; }

 camera.position.x += mx;
 camera.position.z += mz;

 renderer.render(scene,camera);
}
animate();

// resize
window.addEventListener('resize',()=>{
 camera.aspect = innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
