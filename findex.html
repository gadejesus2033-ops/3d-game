<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Game (Clean)</title>

<style>
body{margin:0;overflow:hidden;background:black;}
#overlay{
 position:absolute;inset:0;
 display:flex;align-items:center;justify-content:center;
 color:white;background:black;font-family:sans-serif;
}
#crosshair{
 position:fixed;left:50%;top:50%;
 width:10px;height:10px;
 transform:translate(-50%,-50%);
}
#crosshair:before,#crosshair:after{
 content:"";position:absolute;background:white;
}
#crosshair:before{width:10px;height:2px;top:4px;}
#crosshair:after{width:2px;height:10px;left:4px;}

#hud{
 position:fixed;bottom:10px;left:10px;
 color:white;font-family:sans-serif;
}
</style>
</head>

<body>

<div id="overlay">CLICK TO START</div>
<div id="crosshair"></div>
<div id="hud"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ===== SCENE =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.8));

// ===== CONTROLS =====
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

overlay.onclick=()=>controls.lock();
controls.addEventListener("lock",()=>overlay.style.display="none");
controls.addEventListener("unlock",()=>overlay.style.display="flex");

// ===== INPUT =====
const keys={};
let breaking=false;

onkeydown=e=>keys[e.code]=true;
onkeyup=e=>keys[e.code]=false;

onmousedown=e=>{
 if(e.button===0) breaking=true;
 if(e.button===2) placeBlock();
};
onmouseup=e=>{
 if(e.button===0) breaking=false;
};

// ===== PLAYER =====
let vy=0,onGround=false;
const gravity=-0.02,jump=0.35;

camera.position.set(0,10,10);

// ===== MATERIALS =====
const mats={
 grass:new THREE.MeshLambertMaterial({color:0x55aa55}),
 dirt:new THREE.MeshLambertMaterial({color:0x8B4513}),
 stone:new THREE.MeshLambertMaterial({color:0x888888})
};

const geo=new THREE.BoxGeometry(1,1,1);

// ===== WORLD =====
const world=new Map();
const meshes=new Map();
const key=(x,y,z)=>`${x},${y},${z}`;

function add(x,y,z,t){
 const k=key(x,y,z);
 world.set(k,t);

 const m=new THREE.Mesh(geo,mats[t]);
 m.position.set(x,y,z);
 scene.add(m);
 meshes.set(k,m);
}

function remove(x,y,z){
 const k=key(x,y,z);
 if(meshes.has(k)){
  scene.remove(meshes.get(k));
  meshes.delete(k);
  world.delete(k);
 }
}

// terrain
for(let x=-25;x<25;x++){
 for(let z=-25;z<25;z++){
  let h=Math.floor(Math.sin(x*0.2)*2+Math.cos(z*0.2)*2)+5;

  add(x,h,z,"grass");

  for(let y=h-1;y>h-4;y--) add(x,y,z,"dirt");
  for(let y=h-4;y>-10;y--) add(x,y,z,"stone");
 }
}

// ===== INVENTORY =====
const inv={grass:0,dirt:0,stone:0};
const items=["grass","dirt","stone"];
let selected=0;

addEventListener("wheel",e=>{
 selected=(selected+(e.deltaY>0?1:-1)+items.length)%items.length;
});

// ===== COLLISION =====
function solid(x,y,z){return world.has(key(x,y,z));}

function collide(px,py,pz){
 for(let x=Math.floor(px-0.3);x<=Math.floor(px+0.3);x++)
 for(let y=Math.floor(py);y<=Math.floor(py+1.8);y++)
 for(let z=Math.floor(pz-0.3);z<=Math.floor(pz+0.3);z++)
  if(solid(x,y,z)) return true;
 return false;
}

// ===== RAY =====
const ray=new THREE.Raycaster();
ray.far=6;

function getTarget(){
 ray.setFromCamera({x:0,y:0},camera);
 const hits=ray.intersectObjects([...meshes.values()]);
 return hits.length?hits[0]:null;
}

// ===== BREAK =====
let breakTimer=0;

// ===== PLACE =====
function placeBlock(){
 const hit=getTarget();
 if(!hit) return;

 const normal=hit.face.normal;
 const pos=hit.object.position;

 const x=pos.x+normal.x;
 const y=pos.y+normal.y;
 const z=pos.z+normal.z;

 const type=items[selected];

 if(inv[type]>0 && !world.has(key(x,y,z))){
  add(x,y,z,type);
  inv[type]--;
 }
}

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed=keys["ShiftLeft"]?0.2:0.12;

 const f=new THREE.Vector3();
 camera.getWorldDirection(f);f.y=0;f.normalize();

 const r=new THREE.Vector3();
 r.crossVectors(f,new THREE.Vector3(0,1,0)).normalize();

 let dx=0,dz=0;

 if(keys["KeyW"]){dx+=f.x*speed;dz+=f.z*speed;}
 if(keys["KeyS"]){dx-=f.x*speed;dz-=f.z*speed;}
 if(keys["KeyA"]){dx-=r.x*speed;dz-=r.z*speed;}
 if(keys["KeyD"]){dx+=r.x*speed;dz+=r.z*speed;}

 let nx=camera.position.x+dx;
 let nz=camera.position.z+dz;

 if(!collide(nx,camera.position.y-1.6,camera.position.z))
  camera.position.x=nx;

 if(!collide(camera.position.x,camera.position.y-1.6,nz))
  camera.position.z=nz;

 // gravity
 vy+=gravity;
 let ny=camera.position.y+vy;

 if(vy<=0){
  if(collide(camera.position.x,ny-1.6,camera.position.z)){
   camera.position.y=Math.floor(ny-1.6)+2.6;
   vy=0;onGround=true;
  } else camera.position.y=ny;
 } else camera.position.y=ny;

 if(keys["Space"]&&onGround){
  vy=jump;
  onGround=false;
 }

 // break
 const hit=getTarget();
 if(hit && breaking){
  breakTimer++;
  if(breakTimer>8){
   const p=hit.object.position;
   const t=world.get(key(p.x,p.y,p.z));
   inv[t]++;
   remove(p.x,p.y,p.z);
   breakTimer=0;
  }
 } else breakTimer=0;

 // HUD
 hud.innerText="Block: "+items[selected]+" | "+inv[items[selected]];

 renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
