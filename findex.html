<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Game Final</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:sans-serif;}

#overlay{
 position:absolute;inset:0;
 display:flex;align-items:center;justify-content:center;
 color:white;background:black;cursor:pointer;
}

#crosshair{
 position:fixed;left:50%;top:50%;
 width:10px;height:10px;
 transform:translate(-50%,-50%);
}
#crosshair:before,#crosshair:after{
 content:"";position:absolute;background:white;
}
#crosshair:before{width:10px;height:2px;top:4px;}
#crosshair:after{width:2px;height:10px;left:4px;}

#hotbar{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 display:flex;
 gap:6px;
}

.slot{
 width:50px;height:50px;
 border:2px solid white;
 background:rgba(0,0,0,0.5);
 display:flex;
 align-items:center;
 justify-content:center;
 color:white;
 font-size:12px;
 white-space:pre;
}

.selected{
 border:3px solid yellow;
}
</style>
</head>

<body>

<div id="overlay">CLICK TO START</div>
<div id="crosshair"></div>
<div id="hotbar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ===== SCENE =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({antialias:false});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.8));

// ===== CONTROLS =====
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

overlay.onclick=()=>controls.lock();
controls.addEventListener("lock",()=>overlay.style.display="none");

// ===== INPUT =====
const keys={};
let mouseDown=false;

onkeydown=e=>keys[e.code]=true;
onkeyup=e=>keys[e.code]=false;

addEventListener("mousedown",e=>{
 if(e.button===0) mouseDown=true;
});
addEventListener("mouseup",e=>{
 if(e.button===0) mouseDown=false;
});

// ===== PLAYER =====
let vy=0,onGround=false;
const gravity=-0.02,jump=0.35;
camera.position.set(0,12,10);

// ===== TEXTURES =====
function tex(colors){
 const c=document.createElement("canvas");
 c.width=4;c.height=4;
 const ctx=c.getContext("2d");
 for(let x=0;x<4;x++)
 for(let y=0;y<4;y++){
  ctx.fillStyle=colors[Math.floor(Math.random()*colors.length)];
  ctx.fillRect(x,y,1,1);
 }
 const t=new THREE.CanvasTexture(c);
 t.magFilter=t.minFilter=THREE.NearestFilter;
 return t;
}

// ===== MATERIALS =====
const mats={
 grass:new THREE.MeshLambertMaterial({map:tex(["#55aa55","#4c9c4c"])}),
 dirt:new THREE.MeshLambertMaterial({map:tex(["#8B4513"])}),
 stone:new THREE.MeshLambertMaterial({map:tex(["#888","#777"])}),
 wood:new THREE.MeshLambertMaterial({map:tex(["#8b5a2b"])}),
 leaves:new THREE.MeshLambertMaterial({map:tex(["#2e8b57"])})
};

const geo=new THREE.BoxGeometry(1,1,1);

// ===== WORLD =====
const world=new Map();
const meshes=new Map();
const key=(x,y,z)=>`${x},${y},${z}`;

function add(x,y,z,t){
 const k=key(x,y,z);
 if(world.has(k)) return;
 world.set(k,t);
 const m=new THREE.Mesh(geo,mats[t]);
 m.position.set(x,y,z);
 scene.add(m);
 meshes.set(k,m);
}

function remove(x,y,z){
 const k=key(x,y,z);
 if(meshes.has(k)){
  scene.remove(meshes.get(k));
  meshes.delete(k);
  world.delete(k);
 }
}

// terrain (same feel)
function height(x,z){
 return Math.floor(Math.sin(x*0.2)*2+Math.cos(z*0.2)*2);
}

for(let x=-25;x<25;x++){
 for(let z=-25;z<25;z++){

  let h=height(x,z)+6;

  add(x,h,z,"grass");
  for(let y=h-1;y>h-4;y--) add(x,y,z,"dirt");
  for(let y=h-4;y>-15;y--) add(x,y,z,"stone");

  if(Math.random()<0.08){
   for(let i=1;i<=4;i++) add(x,h+i,z,"wood");
   for(let dx=-2;dx<=2;dx++)
   for(let dz=-2;dz<=2;dz++)
   for(let dy=3;dy<=5;dy++)
    if(Math.random()>0.3)
     add(x+dx,h+dy,z+dz,"leaves");
  }
 }
}

// ===== INVENTORY =====
const inv={
 grass:0,dirt:0,stone:0,wood:0,leaves:0,
 wooden_pickaxe:1,
 wooden_axe:1
};

const items=[
 "grass","dirt","stone",
 "wood","leaves",
 "wooden_pickaxe","wooden_axe"
];

let selected=0;

// ===== HOTBAR =====
const hotbar=document.getElementById("hotbar");

function updateHotbar(){
 hotbar.innerHTML="";
 items.forEach((item,i)=>{
  const div=document.createElement("div");
  div.className="slot"+(i===selected?" selected":"");
  div.innerText=item+"\n"+(inv[item]||0);
  hotbar.appendChild(div);
 });
}

addEventListener("wheel",e=>{
 selected=(selected+(e.deltaY>0?1:-1)+items.length)%items.length;
});

addEventListener("keydown",e=>{
 if(e.code.startsWith("Digit")){
  let n=parseInt(e.code.replace("Digit",""))-1;
  if(n>=0 && n<items.length) selected=n;
 }
});

// ===== TOOLS =====
const toolData={
 wooden_pickaxe:{type:"pickaxe",speed:1},
 wooden_axe:{type:"axe",speed:1.5}
};

const blockRules={
 grass:{tool:null},
 dirt:{tool:null},
 leaves:{tool:null},
 wood:{tool:"axe"},
 stone:{tool:"pickaxe"}
};

// ===== RAY =====
const ray=new THREE.Raycaster();
ray.far=6;

function getTarget(){
 ray.setFromCamera({x:0,y:0},camera);
 return ray.intersectObjects([...meshes.values()])[0];
}

// ===== BREAK SYSTEM (REAL 1 SECOND) =====
let breakProgress=0;
let targetBlock=null;
let last=performance.now();

function updateBreak(){

 const now=performance.now();
 const delta=(now-last)/1000;
 last=now;

 if(!mouseDown){
  breakProgress=0;
  targetBlock=null;
  return;
 }

 const hit=getTarget();
 if(!hit){
  breakProgress=0;
  return;
 }

 const p=hit.object.position;
 const k=key(p.x,p.y,p.z);

 if(targetBlock!==k){
  targetBlock=k;
  breakProgress=0;
 }

 const block=world.get(k);
 const rule=blockRules[block];

 const tool=toolData[items[selected]];

 if(rule.tool && (!tool || tool.type!==rule.tool)){
  breakProgress=0;
  return;
 }

 breakProgress+=delta;

 if(breakProgress>=1){

  if(!rule.tool || (tool && tool.type===rule.tool)){
   inv[block]=(inv[block]||0)+1;
  }

  remove(p.x,p.y,p.z);
  breakProgress=0;
 }

}

// ===== PLACE =====
addEventListener("contextmenu",e=>e.preventDefault());

addEventListener("mousedown",e=>{
 if(e.button===2){

  const hit=getTarget();
  if(!hit) return;

  const type=items[selected];

  if(!["grass","dirt","stone","wood","leaves"].includes(type)) return;
  if(inv[type]<=0) return;

  const n=hit.face.normal;
  const p=hit.object.position;

  add(p.x+n.x,p.y+n.y,p.z+n.z,type);
  inv[type]--;
 }
});

// ===== CRAFTING =====
addEventListener("keydown",e=>{
 if(e.code==="KeyE"){

  if(inv.stone>=3 && inv.wood>=2){
   inv.stone-=3;
   inv.wood-=2;
   inv.wooden_pickaxe++;
   alert("Crafted Pickaxe!");
   return;
  }

  if(inv.wood>=3 && inv.stone>=2){
   inv.wood-=3;
   inv.stone-=2;
   inv.wooden_axe++;
   alert("Crafted Axe!");
   return;
  }

  alert("Not enough materials!");
 }
});

// ===== COLLISION =====
function solid(x,y,z){return world.has(key(x,y,z));}

function collide(px,py,pz){
 for(let x=Math.floor(px-0.3);x<=Math.floor(px+0.3);x++)
 for(let y=Math.floor(py);y<=Math.floor(py+1.8);y++)
 for(let z=Math.floor(pz-0.3);z<=Math.floor(pz+0.3);z++)
  if(solid(x,y,z)) return true;
 return false;
}

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 updateBreak();
 updateHotbar();

 const speed=keys["ShiftLeft"]?0.2:0.12;

 const f=new THREE.Vector3();
 camera.getWorldDirection(f);f.y=0;f.normalize();

 const r=new THREE.Vector3();
 r.crossVectors(f,new THREE.Vector3(0,1,0)).normalize();

 let dx=0,dz=0;

 if(keys["KeyW"]){dx+=f.x*speed;dz+=f.z*speed;}
 if(keys["KeyS"]){dx-=f.x*speed;dz-=f.z*speed;}
 if(keys["KeyA"]){dx-=r.x*speed;dz-=r.z*speed;}
 if(keys["KeyD"]){dx+=r.x*speed;dz+=r.z*speed;}

 let nx=camera.position.x+dx;
 let nz=camera.position.z+dz;

 if(!collide(nx,camera.position.y-1.6,camera.position.z))
  camera.position.x=nx;

 if(!collide(camera.position.x,camera.position.y-1.6,nz))
  camera.position.z=nz;

 vy+=gravity;
 let ny=camera.position.y+vy;

 if(vy<=0){
  if(collide(camera.position.x,ny-1.6,camera.position.z)){
   camera.position.y=Math.floor(ny-1.6)+2.6;
   vy=0;onGround=true;
  } else camera.position.y=ny;
 } else camera.position.y=ny;

 if(keys["Space"]&&onGround){
  vy=jump;
  onGround=false;
 }

 renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
