<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Keyboard FIX</title>
<style>
body { margin:0; overflow:hidden; }
#overlay {
 position:absolute; inset:0;
 background:black; color:white;
 display:flex; align-items:center; justify-content:center;
}
</style>
</head>
<body tabindex="0">

<div id="overlay">CLICK HERE FIRST</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// light + ground
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

const ground = new THREE.Mesh(
 new THREE.BoxGeometry(50,1,50),
 new THREE.MeshLambertMaterial({color:0x00aa00})
);
ground.position.y = -1;
scene.add(ground);

// ===== CONTROLS =====
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const overlay = document.getElementById('overlay');

// 🔥 IMPORTANT: CLICK HANDLER DOES EVERYTHING
overlay.onclick = () => {

 // force focus FIRST
 document.body.focus();

 // THEN pointer lock
 document.body.requestPointerLock();

 console.log("Clicked + Focused");
};

// pointer lock state
document.addEventListener('pointerlockchange', () => {
 if(document.pointerLockElement === document.body){
  overlay.style.display = 'none';
  console.log("Pointer lock ON");
 } else {
  overlay.style.display = 'flex';
 }
});

// ===== INPUT (FORCED GLOBAL) =====
const keys = {};

window.onkeydown = function(e){
 keys[e.code] = true;
 console.log("DOWN:", e.code);
};

window.onkeyup = function(e){
 keys[e.code] = false;
};

// start pos
camera.position.set(0,2,5);

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed = 0.1;
 const angle = camera.rotation.y;

 let moveX = 0;
 let moveZ = 0;

 if(keys['KeyW']){
  moveX += -Math.sin(angle) * speed;
  moveZ += -Math.cos(angle) * speed;
 }
 if(keys['KeyS']){
  moveX += Math.sin(angle) * speed;
  moveZ += Math.cos(angle) * speed;
 }
 if(keys['KeyA']){
  moveX += -Math.cos(angle) * speed;
  moveZ += Math.sin(angle) * speed;
 }
 if(keys['KeyD']){
  moveX += Math.cos(angle) * speed;
  moveZ += -Math.sin(angle) * speed;
 }

 camera.position.x += moveX;
 camera.position.z += moveZ;

 renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
