<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Full Movement (Arrow Keys)</title>
<style>
body { margin:0; overflow:hidden; }
#overlay {
 position:absolute; inset:0;
 background:black; color:white;
 display:flex; align-items:center; justify-content:center;
}
</style>
</head>
<body tabindex="0">

<div id="overlay">CLICK TO START</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>
// ===== SETUP =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// light
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

// ground
const ground = new THREE.Mesh(
 new THREE.BoxGeometry(50,1,50),
 new THREE.MeshLambertMaterial({color:0x00aa00})
);
ground.position.y = -1;
scene.add(ground);

// ===== CONTROLS =====
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const overlay = document.getElementById('overlay');

overlay.onclick = ()=>{
 document.body.focus();
 document.body.requestPointerLock();
};

document.addEventListener('pointerlockchange', ()=>{
 if(document.pointerLockElement === document.body){
  overlay.style.display = 'none';
 } else {
  overlay.style.display = 'flex';
 }
});

// ===== INPUT =====
const keys = {
 up:false,
 down:false,
 left:false,
 right:false
};

window.onkeydown = (e)=>{
 if(e.code==='ArrowUp') keys.up = true;
 if(e.code==='ArrowDown') keys.down = true;
 if(e.code==='ArrowLeft') keys.left = true;
 if(e.code==='ArrowRight') keys.right = true;
};

window.onkeyup = (e)=>{
 if(e.code==='ArrowUp') keys.up = false;
 if(e.code==='ArrowDown') keys.down = false;
 if(e.code==='ArrowLeft') keys.left = false;
 if(e.code==='ArrowRight') keys.right = false;
};

// start position
camera.position.set(0,2,5);

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed = 0.1;

 // forward direction
 const forward = new THREE.Vector3();
 camera.getWorldDirection(forward);

 // sideways direction
 const right = new THREE.Vector3();
 right.crossVectors(forward, new THREE.Vector3(0,1,0)).normalize();

 let moveX = 0;
 let moveZ = 0;

 // forward/back
 if(keys.up){
  moveX += forward.x * speed;
  moveZ += forward.z * speed;
 }
 if(keys.down){
  moveX -= forward.x * speed;
  moveZ -= forward.z * speed;
 }

 // left/right
 if(keys.left){
  moveX -= right.x * speed;
  moveZ -= right.z * speed;
 }
 if(keys.right){
  moveX += right.x * speed;
  moveZ += right.z * speed;
 }

 camera.position.x += moveX;
 camera.position.z += moveZ;

 renderer.render(scene,camera);
}
animate();

// resize
window.addEventListener('resize',()=>{
 camera.aspect = innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
