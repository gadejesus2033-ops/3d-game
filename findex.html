<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Minecraft Clone (Fixed Pointer Lock)</title>
<style>
body { margin:0; overflow:hidden; }
#overlay { position:absolute; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; flex-direction:column; color:white; }
</style>
</head>
<body>

<div id="overlay">
<h1>Click to Play</h1>
<button id="startBtn">Start</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>
<script>
// ===== SETUP =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(50,100,50);
scene.add(light);

// ===== BLOCKS =====
const geometry = new THREE.BoxGeometry(1,1,1);
const material = new THREE.MeshLambertMaterial({color:0x55aa55});

const blocks = new Map();
function key(x,y,z){return `${x},${y},${z}`;}

function hasBlock(x,y,z){
 return blocks.has(key(Math.round(x),Math.round(y),Math.round(z)));
}

// ===== CHUNKS =====
const CHUNK_SIZE = 16;
const RENDER_DISTANCE = 2;
const chunks = new Map();

function chunkKey(cx,cz){return `${cx},${cz}`;}
function noise(x,z){ return Math.sin(x*0.1)*Math.cos(z*0.1); }

function generateChunk(cx,cz){
 const keyC = chunkKey(cx,cz);
 if(chunks.has(keyC)) return;

 const group = new THREE.Group();

 for(let x=0;x<CHUNK_SIZE;x++){
  for(let z=0;z<CHUNK_SIZE;z++){
   const worldX = cx*CHUNK_SIZE + x;
   const worldZ = cz*CHUNK_SIZE + z;
   const h = Math.floor(noise(worldX,worldZ)*5);

   for(let y=-5;y<=h;y++){
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(worldX,y,worldZ);
    group.add(mesh);
    blocks.set(key(worldX,y,worldZ), mesh);
   }
  }
 }

 scene.add(group);
 chunks.set(keyC, group);
}

function updateChunks(){
 const cx = Math.floor(camera.position.x / CHUNK_SIZE);
 const cz = Math.floor(camera.position.z / CHUNK_SIZE);

 for(let x=-RENDER_DISTANCE;x<=RENDER_DISTANCE;x++){
  for(let z=-RENDER_DISTANCE;z<=RENDER_DISTANCE;z++){
   generateChunk(cx+x, cz+z);
  }
 }
}

// ===== CONTROLS (FIXED) =====
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');

// IMPORTANT FIX: must be inside real user click event
startBtn.addEventListener('click', () => {
 try {
  controls.lock();
 } catch(e) {
  console.warn('Pointer lock failed:', e);
 }
});

controls.addEventListener('lock',()=>{
 overlay.style.display='none';
});

controls.addEventListener('unlock',()=>{
 overlay.style.display='flex';
});

// fallback: click anywhere also locks
document.addEventListener('click', () => {
 if(!controls.isLocked){
  try { controls.lock(); } catch(e){}
 }
});

// ===== MOVEMENT =====
let moveQueue = [];
let moving = false;
const playerHeight = 1.8;

camera.position.set(0,10,0);

window.addEventListener('keydown',e=>{
 if(moving) return;

 if(e.code==='KeyW') moveQueue.push({x:0,z:-1});
 if(e.code==='KeyS') moveQueue.push({x:0,z:1});
 if(e.code==='KeyA') moveQueue.push({x:-1,z:0});
 if(e.code==='KeyD') moveQueue.push({x:1,z:0});
});

function tryMoveStep(stepX, stepZ){
 const targetX = Math.round(camera.position.x) + stepX;
 const targetZ = Math.round(camera.position.z) + stepZ;
 const y = camera.position.y;

 for(let i=0;i<2;i++){
  if(hasBlock(targetX, Math.floor(y)-i, targetZ)){
   return false;
  }
 }

 camera.position.x = targetX;
 camera.position.z = targetZ;
 return true;
}

function getGround(x,z){
 let max=-Infinity;
 for(const k of blocks.keys()){
  const [bx,by,bz]=k.split(',').map(Number);
  if(Math.round(bx)===Math.round(x)&&Math.round(bz)===Math.round(z)){
   if(by>max) max=by;
  }
 }
 return max===-Infinity ? -5 : max;
}

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 updateChunks();

 if(!moving && moveQueue.length > 0){
  const step = moveQueue.shift();
  moving = true;

  tryMoveStep(step.x, step.z);

  setTimeout(()=>{
    moving = false;
  },120);
 }

 const ground = getGround(camera.position.x,camera.position.z);
 const floor = ground + playerHeight;

 if(camera.position.y <= floor){
  camera.position.y = floor;
 } else {
  camera.position.y -= 0.1;
 }

 renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
