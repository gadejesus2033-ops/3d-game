<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Visible Floor + Movement</title>
<style>
body{margin:0;overflow:hidden;background:black;}
#overlay{
 position:absolute;inset:0;
 display:flex;align-items:center;justify-content:center;
 color:white;font-family:sans-serif;cursor:pointer;
}
</style>
</head>

<body>
<div id="overlay">CLICK TO START</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// camera
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== FLOOR (VERY VISIBLE) =====
const floor = new THREE.Mesh(
 new THREE.BoxGeometry(200, 1, 200),
 new THREE.MeshBasicMaterial({ color: 0x00ff00 }) // bright green
);
floor.position.set(0, -1, 0);
scene.add(floor);

// ===== CONTROLS =====
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const overlay = document.getElementById("overlay");

overlay.onclick = () => {
 controls.lock();
 document.body.focus();
};

controls.addEventListener("lock",()=>overlay.style.display="none");
controls.addEventListener("unlock",()=>overlay.style.display="flex");

// ===== INPUT =====
let forward=false, back=false, left=false, right=false;

document.addEventListener("keydown", e => {
 if(e.code==="KeyW") forward=true;
 if(e.code==="KeyS") back=true;
 if(e.code==="KeyA") left=true;
 if(e.code==="KeyD") right=true;
});

document.addEventListener("keyup", e => {
 if(e.code==="KeyW") forward=false;
 if(e.code==="KeyS") back=false;
 if(e.code==="KeyA") left=false;
 if(e.code==="KeyD") right=false;
});

// ===== START POSITION =====
// IMPORTANT: look slightly DOWN so you SEE the floor
camera.position.set(0, 2, 5);
camera.rotation.x = -0.3;

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed = 0.15;

 if(forward) controls.moveForward(speed);
 if(back) controls.moveForward(-speed);
 if(left) controls.moveRight(-speed);
 if(right) controls.moveRight(speed);

 // stay on ground
 camera.position.y = 2;

 renderer.render(scene, camera);
}

animate();

</script>
</body>
</html>
