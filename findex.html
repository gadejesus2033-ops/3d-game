<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Engine Full</title>

<style>
body { margin:0; overflow:hidden; }
#overlay {
 position:absolute; inset:0;
 background:black;
 color:white;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:20px;
}
</style>
</head>

<body tabindex="0">
<div id="overlay">CLICK TO START</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>
// ================= TEXTURES =================
function tex(a,b){
 const c=document.createElement("canvas");
 c.width=16;c.height=16;
 const ctx=c.getContext("2d");

 for(let x=0;x<16;x++){
  for(let y=0;y<16;y++){
   ctx.fillStyle=Math.random()>0.5?a:b;
   ctx.fillRect(x,y,1,1);
  }
 }

 const t=new THREE.CanvasTexture(c);
 t.magFilter=THREE.NearestFilter;
 return t;
}

const mat={
 grass:new THREE.MeshLambertMaterial({map:tex("#3cb043","#2e8b3c")}),
 dirt:new THREE.MeshLambertMaterial({map:tex("#8b5a2b","#6e4420")}),
 stone:new THREE.MeshLambertMaterial({map:tex("#888","#666")}),
 wood:new THREE.MeshLambertMaterial({map:tex("#a0522d","#7b3f00")}),
 leaves:new THREE.MeshLambertMaterial({map:tex("#2ecc71","#27ae60")})
};

// ================= SCENE =================
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.DirectionalLight(0xffffff,1).position.set(5,10,5));

// ================= WORLD =================
const geo=new THREE.BoxGeometry(1,1,1);
const world=new Map();

function key(x,y,z){return `${x},${y},${z}`;}

class Block{
 constructor(x,y,z,type,mesh){
  this.x=x;
  this.y=y;
  this.z=z;
  this.type=type;
  this.mesh=mesh;
  this.solid=true;
 }
}

function addBlock(x,y,z,type,material){
 const mesh=new THREE.Mesh(geo,material);
 mesh.position.set(x,y,z);
 scene.add(mesh);

 world.set(key(x,y,z), new Block(x,y,z,type,mesh));
}

function removeBlock(x,y,z){
 const k=key(x,y,z);
 const b=world.get(k);
 if(!b) return;
 scene.remove(b.mesh);
 world.delete(k);
}

function getBlock(x,y,z){
 return world.get(key(Math.round(x),Math.floor(y),Math.round(z)));
}

// ================= WORLD GEN =================
for(let x=-25;x<25;x++){
 for(let z=-25;z<25;z++){
  addBlock(x,-1,z,"grass",mat.grass);
  addBlock(x,-2,z,"dirt",mat.dirt);
 }
}

function tree(x,z){
 for(let i=0;i<4;i++) addBlock(x,i,z,"wood",mat.wood);

 for(let lx=-2;lx<=2;lx++){
  for(let lz=-2;lz<=2;lz++){
   for(let ly=3;ly<=5;ly++){
    if(Math.abs(lx)+Math.abs(lz)<4){
     addBlock(x+lx,ly,z+lz,"leaves",mat.leaves);
    }
   }
  }
 }
}

tree(5,5);
tree(-5,-5);
tree(10,-10);
tree(-10,10);

function mountain(cx,cz){
 for(let x=-10;x<=10;x++){
  for(let z=-10;z<=10;z++){
   const d=Math.sqrt(x*x+z*z);
   const h=Math.floor(8-d);

   if(h>0){
    for(let y=0;y<h;y++){
     addBlock(cx+x,y,cz+z,"stone",mat.stone);
    }
   }
  }
 }
}

mountain(0,-30);
mountain(0,30);
mountain(-30,0);
mountain(30,0);

// ================= CONTROLS =================
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

document.getElementById("overlay").onclick=()=>{
 document.body.requestPointerLock();
};

document.addEventListener("pointerlockchange",()=>{
 document.getElementById("overlay").style.display=
 document.pointerLockElement===document.body?"none":"flex";
});

// ================= INPUT =================
const keys={up:false,down:false,left:false,right:false};

let velocityY=0;
const gravity=-0.01;
const jumpPower=0.2;
let onGround=false;

const player={width:0.6,height:2,depth:0.6};

// ================= COLLISION =================
function collides(x,y,z){
 const minX=x-player.width/2;
 const maxX=x+player.width/2;
 const minY=y;
 const maxY=y+player.height;
 const minZ=z-player.depth/2;
 const maxZ=z+player.depth/2;

 for(let ix=Math.floor(minX);ix<=Math.floor(maxX);ix++){
  for(let iy=Math.floor(minY);iy<=Math.floor(maxY);iy++){
   for(let iz=Math.floor(minZ);iz<=Math.floor(maxZ);iz++){
    const b=getBlock(ix,iy,iz);
    if(b) return true;
   }
  }
 }
 return false;
}

// ================= MOVE =================
function move(dx,dz){
 const steps=8;

 for(let i=0;i<steps;i++){
  let sx=dx/steps;
  let sz=dz/steps;

  let nx=camera.position.x+sx;
  let nz=camera.position.z+sz;

  if(!collides(nx,camera.position.y,camera.position.z)){
   camera.position.x=nx;
  }
  if(!collides(camera.position.x,camera.position.y,nz)){
   camera.position.z=nz;
  }
 }
}

// ================= INPUT EVENTS =================
window.onkeydown=e=>{
 if(e.code==="ArrowUp")keys.up=true;
 if(e.code==="ArrowDown")keys.down=true;
 if(e.code==="ArrowLeft")keys.left=true;
 if(e.code==="ArrowRight")keys.right=true;

 if(e.code==="Space"&&onGround){
  velocityY=jumpPower;
  onGround=false;
 }
};

window.onkeyup=e=>{
 if(e.code==="ArrowUp")keys.up=false;
 if(e.code==="ArrowDown")keys.down=false;
 if(e.code==="ArrowLeft")keys.left=false;
 if(e.code==="ArrowRight")keys.right=false;
};

// ================= BREAK / PLACE =================
const raycaster=new THREE.Raycaster();

window.addEventListener("mousedown",(e)=>{
 raycaster.setFromCamera({x:0,y:0},camera);

 const hits=raycaster.intersectObjects(scene.children);

 if(hits.length===0) return;

 const hit=hits[0].object;

 const pos=hit.position;

 if(e.button===0){
  removeBlock(pos.x,pos.y,pos.z); // break
 }

 if(e.button===2){
  addBlock(
   Math.round(pos.x),
   Math.round(pos.y+1),
   Math.round(pos.z),
   "stone",
   mat.stone
  );
 }
});

window.addEventListener("contextmenu",e=>e.preventDefault());

// ================= LOOP =================
camera.position.set(0,3,5);

function animate(){
 requestAnimationFrame(animate);

 const speed=0.1;

 const forward=new THREE.Vector3();
 camera.getWorldDirection(forward);
 forward.y=0;
 forward.normalize();

 const right=new THREE.Vector3();
 right.crossVectors(forward,new THREE.Vector3(0,1,0)).normalize();

 let mx=0,mz=0;

 if(keys.up){mx+=forward.x*speed;mz+=forward.z*speed;}
 if(keys.down){mx-=forward.x*speed;mz-=forward.z*speed;}
 if(keys.left){mx-=right.x*speed;mz-=right.z*speed;}
 if(keys.right){mx+=right.x*speed;mz+=right.z*speed;}

 move(mx,mz);

// gravity
 velocityY+=gravity;
 camera.position.y+=velocityY;

 if(camera.position.y<=2){
  camera.position.y=2;
  velocityY=0;
  onGround=true;
 }

 renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
