<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fixed Walking Terrain</title>

<style>
body{margin:0;overflow:hidden;background:black;}
#overlay{
 position:absolute;inset:0;
 display:flex;align-items:center;justify-content:center;
 color:white;font-family:sans-serif;cursor:pointer;
}
#crosshair{
 position:fixed;left:50%;top:50%;
 width:10px;height:10px;transform:translate(-50%,-50%);
}
#crosshair:before,#crosshair:after{
 content:"";position:absolute;background:white;
}
#crosshair:before{width:10px;height:2px;top:4px;}
#crosshair:after{width:2px;height:10px;left:4px;}
</style>
</head>

<body>
<div id="overlay">CLICK TO START</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// =====================
// ENGINE
// =====================
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff));

// controls
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

const overlay=document.getElementById("overlay");
overlay.onclick=()=>controls.lock();
controls.addEventListener("lock",()=>overlay.style.display="none");
controls.addEventListener("unlock",()=>overlay.style.display="flex");

// input
const keys={};
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

// =====================
// WORLD
// =====================
const world=new Map();
const geo=new THREE.BoxGeometry(1,1,1);
const mat=new THREE.MeshLambertMaterial({color:0x3cb043});

function key(x,y,z){return `${x},${y},${z}`;}

function height(x,z){
 return Math.floor(Math.sin(x*0.2)*2 + Math.cos(z*0.2)*2);
}

// build terrain
for(let x=-30;x<30;x++){
 for(let z=-30;z<30;z++){
  let h=height(x,z);
  for(let y=-3;y<=h;y++){
   world.set(key(x,y,z),1);
   const b=new THREE.Mesh(geo,mat);
   b.position.set(x,y,z);
   scene.add(b);
  }
 }
}

// =====================
// COLLISION (correct)
// =====================
function collide(px,py,pz){

 const size=0.3;

 const minX=Math.floor(px-size);
 const maxX=Math.floor(px+size);
 const minY=Math.floor(py-1.8);
 const maxY=Math.floor(py);
 const minZ=Math.floor(pz-size);
 const maxZ=Math.floor(pz+size);

 for(let x=minX;x<=maxX;x++){
  for(let y=minY;y<=maxY;y++){
   for(let z=minZ;z<=maxZ;z++){
    if(world.has(key(x,y,z))) return true;
   }
  }
 }
 return false;
}

// =====================
// MOVEMENT (FIXED MINECRAFT STYLE)
// =====================
camera.position.set(0,5,10);

function canMove(nx,ny,nz){
 return !collide(nx,ny,nz);
}

function animate(){
 requestAnimationFrame(animate);

 const speed=0.15;

 const forward=new THREE.Vector3();
 camera.getWorldDirection(forward);
 forward.y=0;
 forward.normalize();

 const right=new THREE.Vector3();
 right.crossVectors(forward,new THREE.Vector3(0,1,0)).normalize();

 let nx=camera.position.x;
 let nz=camera.position.z;

 if(keys["KeyW"]){
  nx += forward.x*speed;
  nz += forward.z*speed;
 }
 if(keys["KeyS"]){
  nx -= forward.x*speed;
  nz -= forward.z*speed;
 }
 if(keys["KeyA"]){
  nx -= right.x*speed;
  nz -= right.z*speed;
 }
 if(keys["KeyD"]){
  nx += right.x*speed;
  nz += right.z*speed;
 }

 // ✔ ONLY MOVE IF VALID
 if(canMove(nx,camera.position.y,camera.position.z)){
  camera.position.x = nx;
 }

 if(canMove(camera.position.x,camera.position.y,nz)){
  camera.position.z = nz;
 }

 renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
