<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Game + Hotbar</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:sans-serif;}

#overlay{
 position:absolute;inset:0;
 display:flex;align-items:center;justify-content:center;
 color:white;background:black;cursor:pointer;
}

#crosshair{
 position:fixed;left:50%;top:50%;
 width:10px;height:10px;
 transform:translate(-50%,-50%);
}
#crosshair:before,#crosshair:after{
 content:"";position:absolute;background:white;
}
#crosshair:before{width:10px;height:2px;top:4px;}
#crosshair:after{width:2px;height:10px;left:4px;}

#hotbar{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 display:flex;
 gap:6px;
}

.slot{
 width:50px;height:50px;
 border:2px solid white;
 background:rgba(0,0,0,0.5);
 display:flex;
 align-items:center;
 justify-content:center;
 color:white;
 font-size:12px;
}

.selected{
 border:3px solid yellow;
}

</style>
</head>

<body>

<div id="overlay">CLICK TO START</div>
<div id="crosshair"></div>
<div id="hotbar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ===== SCENE =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.8));

// ===== CONTROLS =====
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

overlay.onclick=()=>controls.lock();
controls.addEventListener("lock",()=>overlay.style.display="none");

// ===== INPUT =====
const keys={};
let mouseDown=false;

onkeydown=e=>keys[e.code]=true;
onkeyup=e=>keys[e.code]=false;

addEventListener("mousedown",e=>{
 if(e.button===0) mouseDown=true;
});
addEventListener("mouseup",e=>{
 if(e.button===0) mouseDown=false;
});

// ===== PLAYER =====
let vy=0,onGround=false;
const gravity=-0.02,jump=0.35;
camera.position.set(0,15,10);

// ===== TEXTURES =====
function tex(c){
 const canvas=document.createElement("canvas");
 canvas.width=4;canvas.height=4;
 const ctx=canvas.getContext("2d");
 for(let x=0;x<4;x++)
 for(let y=0;y<4;y++){
  ctx.fillStyle=c[Math.floor(Math.random()*c.length)];
  ctx.fillRect(x,y,1,1);
 }
 const t=new THREE.CanvasTexture(canvas);
 t.magFilter=t.minFilter=THREE.NearestFilter;
 return t;
}

const mats={
 grass:new THREE.MeshLambertMaterial({map:tex(["#55aa55","#4c9c4c"])}),
 dirt:new THREE.MeshLambertMaterial({map:tex(["#8B4513"])}),
 stone:new THREE.MeshLambertMaterial({map:tex(["#888"])}),
 wood:new THREE.MeshLambertMaterial({map:tex(["#8b5a2b"])}),
 leaves:new THREE.MeshLambertMaterial({map:tex(["#2e8b57"])})
};

const geo=new THREE.BoxGeometry(1,1,1);

// ===== WORLD =====
const world=new Map();
const meshes=new Map();
const key=(x,y,z)=>`${x},${y},${z}`;

function add(x,y,z,t){
 const k=key(x,y,z);
 if(world.has(k)) return;
 world.set(k,t);
 const m=new THREE.Mesh(geo,mats[t]);
 m.position.set(x,y,z);
 scene.add(m);
 meshes.set(k,m);
}

function remove(x,y,z){
 const k=key(x,y,z);
 if(meshes.has(k)){
  scene.remove(meshes.get(k));
  meshes.delete(k);
  world.delete(k);
 }
}

// terrain
for(let x=-25;x<25;x++){
 for(let z=-25;z<25;z++){
  add(x,0,z,"grass");
  for(let y=-1;y>-10;y--) add(x,y,z,"stone");
 }
}

// ===== INVENTORY =====
const inv={
 grass:0,dirt:0,stone:0,wood:0,leaves:0,
 wooden_pickaxe:1,
 wooden_axe:1
};

const items=[
 "grass","dirt","stone",
 "wood","leaves",
 "wooden_pickaxe","wooden_axe"
];

let selected=0;

// ===== HOTBAR UI =====
const hotbar=document.getElementById("hotbar");

function updateHotbar(){
 hotbar.innerHTML="";
 items.forEach((item,i)=>{
  const div=document.createElement("div");
  div.className="slot"+(i===selected?" selected":"");
  div.innerText=item+"\n"+(inv[item]||0);
  hotbar.appendChild(div);
 });
}

// scroll + keys
addEventListener("wheel",e=>{
 selected=(selected+(e.deltaY>0?1:-1)+items.length)%items.length;
});
addEventListener("keydown",e=>{
 if(e.code.startsWith("Digit")){
  let n=parseInt(e.code.replace("Digit",""))-1;
  if(n>=0 && n<items.length) selected=n;
 }
});

// ===== TOOL RULES =====
const toolData={
 wooden_pickaxe:{type:"pickaxe"},
 wooden_axe:{type:"axe"}
};

const blockRules={
 grass:{tool:null},
 dirt:{tool:null},
 leaves:{tool:null},
 wood:{tool:"axe"},
 stone:{tool:"pickaxe"}
};

// ===== RAY =====
const ray=new THREE.Raycaster();
ray.far=6;

function getTarget(){
 ray.setFromCamera({x:0,y:0},camera);
 return ray.intersectObjects([...meshes.values()])[0];
}

// ===== BREAK =====
let breakProgress=0;
let targetBlock=null;
let last=performance.now();

function updateBreak(){

 const now=performance.now();
 const delta=(now-last)/1000;
 last=now;

 if(!mouseDown){breakProgress=0;targetBlock=null;return;}

 const hit=getTarget();
 if(!hit){breakProgress=0;return;}

 const p=hit.object.position;
 const k=key(p.x,p.y,p.z);

 if(targetBlock!==k){
  targetBlock=k;
  breakProgress=0;
 }

 const block=world.get(k);
 const rule=blockRules[block];

 const tool=toolData[items[selected]];

 if(rule.tool && (!tool || tool.type!==rule.tool)){
  breakProgress=0;
  return;
 }

 breakProgress+=delta;

 if(breakProgress>=1){

  if(!rule.tool || (tool && tool.type===rule.tool)){
   inv[block]=(inv[block]||0)+1;
  }

  remove(p.x,p.y,p.z);
  breakProgress=0;
 }

}

// ===== PLACE =====
addEventListener("contextmenu",e=>e.preventDefault());

addEventListener("mousedown",e=>{
 if(e.button===2){

  const hit=getTarget();
  if(!hit) return;

  const type=items[selected];

  if(!["grass","dirt","stone","wood","leaves"].includes(type)) return;
  if(inv[type]<=0) return;

  const n=hit.face.normal;
  const p=hit.object.position;

  add(p.x+n.x,p.y+n.y,p.z+n.z,type);
  inv[type]--;
 }
});

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 updateBreak();
 updateHotbar();

 renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
