<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Guaranteed Movement</title>
<style>
body{margin:0;overflow:hidden;background:black;}
#overlay{
 position:absolute;inset:0;
 display:flex;align-items:center;justify-content:center;
 color:white;font-family:sans-serif;cursor:pointer;
}
</style>
</head>

<body tabindex="0">
<div id="overlay">CLICK TO START</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// FORCE focus
document.body.focus();

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff));

// floor
const floor = new THREE.Mesh(
 new THREE.BoxGeometry(100,1,100),
 new THREE.MeshBasicMaterial({color:0x00ff00})
);
floor.position.y = -1;
scene.add(floor);

// ===== CONTROLS =====
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const overlay = document.getElementById("overlay");

overlay.onclick = () => {
 controls.lock();
 document.body.focus();
};

controls.addEventListener("lock",()=>overlay.style.display="none");
controls.addEventListener("unlock",()=>overlay.style.display="flex");

// ===== INPUT =====
let forward=false, back=false, left=false, right=false;

document.addEventListener("keydown", e => {
 if(e.code==="KeyW") forward=true;
 if(e.code==="KeyS") back=true;
 if(e.code==="KeyA") left=true;
 if(e.code==="KeyD") right=true;
});

document.addEventListener("keyup", e => {
 if(e.code==="KeyW") forward=false;
 if(e.code==="KeyS") back=false;
 if(e.code==="KeyA") left=false;
 if(e.code==="KeyD") right=false;
});

// start
camera.position.set(0,2,5);

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed = 0.1;

 if(forward) controls.moveForward(speed);
 if(back) controls.moveForward(-speed);
 if(left) controls.moveRight(-speed);
 if(right) controls.moveRight(speed);

 renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
