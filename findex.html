<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft Jump + Terrain</title>

<style>
body{margin:0;overflow:hidden;background:black;}

#overlay{
 position:absolute;inset:0;
 display:flex;align-items:center;justify-content:center;
 color:white;font-family:sans-serif;
 cursor:pointer;
 background:black;
}

#crosshair{
 position:fixed;
 left:50%;top:50%;
 width:10px;height:10px;
 transform:translate(-50%,-50%);
}

#crosshair:before,#crosshair:after{
 content:"";
 position:absolute;
 background:white;
}

#crosshair:before{width:10px;height:2px;top:4px;}
#crosshair:after{width:2px;height:10px;left:4px;}
</style>
</head>

<body>
<div id="overlay">CLICK TO START</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// =====================
// ENGINE
// =====================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff));

// =====================
// CONTROLS
// =====================

const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

document.getElementById("overlay").onclick = () => controls.lock();

// =====================
// INPUT
// =====================

const keys = {};

document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

// =====================
// WORLD
// =====================

const world = new Map();

function key(x,y,z){
 return `${x},${y},${z}`;
}

function height(x,z){
 return Math.floor(
  Math.sin(x*0.12)*4 +
  Math.cos(z*0.12)*4 +
  Math.sin((x+z)*0.05)*2
 );
}

const geo = new THREE.BoxGeometry(1,1,1);
const mat = new THREE.MeshLambertMaterial({color:0x3cb043});

for(let x=-60;x<60;x++){
 for(let z=-60;z<60;z++){

  let h = height(x,z);

  for(let y=-5;y<=h;y++){
   world.set(key(x,y,z),1);

   const block = new THREE.Mesh(geo,mat);
   block.position.set(x,y,z);
   scene.add(block);
  }
 }
}

// =====================
// COLLISION
// =====================

function collide(px,py,pz){

 const s=0.3;

 const minX=Math.floor(px-s);
 const maxX=Math.floor(px+s);
 const minY=Math.floor(py-1.8);
 const maxY=Math.floor(py);
 const minZ=Math.floor(pz-s);
 const maxZ=Math.floor(pz+s);

 for(let x=minX;x<=maxX;x++){
  for(let y=minY;y<=maxY;y++){
   for(let z=minZ;z<=maxZ;z++){
    if(world.has(key(x,y,z))) return true;
   }
  }
 }

 return false;
}

// =====================
// PHYSICS (NEW)
// =====================

let velY = 0;
let onGround = false;

const gravity = -0.02;
const jumpPower = 0.35;

// start
camera.position.set(0,10,10);

// =====================
// INPUT JUMP
// =====================

document.addEventListener("keydown",e=>{
 if(e.code === "Space" && onGround){
  velY = jumpPower;
  onGround = false;
 }
});

// =====================
// LOOP
// =====================

function animate(){
 requestAnimationFrame(animate);

 const speed = 0.15;

 // direction
 const forward = new THREE.Vector3();
 camera.getWorldDirection(forward);
 forward.y = 0;
 forward.normalize();

 const right = new THREE.Vector3();
 right.crossVectors(forward,new THREE.Vector3(0,1,0)).normalize();

 // movement XZ
 let nx = camera.position.x;
 let nz = camera.position.z;

 if(keys["KeyW"]){nx += forward.x * speed; nz += forward.z * speed;}
 if(keys["KeyS"]){nx -= forward.x * speed; nz -= forward.z * speed;}
 if(keys["KeyA"]){nx -= right.x * speed; nz -= right.z * speed;}
 if(keys["KeyD"]){nx += right.x * speed; nz += right.z * speed;}

 if(!collide(nx,camera.position.y,camera.position.z)){
  camera.position.x = nx;
 }

 if(!collide(camera.position.x,camera.position.y,nz)){
  camera.position.z = nz;
 }

 // =====================
 // GRAVITY + JUMP
 // =====================

 velY += gravity;

 let ny = camera.position.y + velY;

 if(velY <= 0){
  if(collide(camera.position.x,ny,camera.position.z)){
   camera.position.y = Math.floor(camera.position.y);
   velY = 0;
   onGround = true;
  } else {
   camera.position.y = ny;
   onGround = false;
  }
 } else {
  if(!collide(camera.position.x,ny,camera.position.z)){
   camera.position.y = ny;
  } else {
   velY = 0;
  }
 }

 renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
