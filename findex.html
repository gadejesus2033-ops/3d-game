<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Look Movement</title>
<style>
body{margin:0;overflow:hidden;background:black;}
#overlay{
 position:absolute;inset:0;
 display:flex;align-items:center;justify-content:center;
 color:white;font-family:sans-serif;cursor:pointer;
}
</style>
</head>

<body>
<div id="overlay">CLICK TO START</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ===== SETUP =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff));

// floor
const floor = new THREE.Mesh(
 new THREE.BoxGeometry(50,1,50),
 new THREE.MeshBasicMaterial({color:0x00ff00})
);
floor.position.y = -1;
scene.add(floor);

// ===== CONTROLS =====
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const overlay = document.getElementById("overlay");

overlay.onclick = () => controls.lock();

controls.addEventListener("lock", () => overlay.style.display="none");
controls.addEventListener("unlock", () => overlay.style.display="flex");

// ===== INPUT =====
const keys = {};
document.addEventListener("keydown", e => keys[e.code]=true);
document.addEventListener("keyup", e => keys[e.code]=false);

// start position
camera.position.set(0,2,5);

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed = 0.12;

 // direction you are LOOKING
 const dir = new THREE.Vector3();
 camera.getWorldDirection(dir);
 dir.y = 0; // stay on ground
 dir.normalize();

 // right/left movement
 const right = new THREE.Vector3();
 right.crossVectors(dir, new THREE.Vector3(0,1,0)).normalize();

 // movement
 if(keys["KeyW"]) camera.position.addScaledVector(dir, speed);
 if(keys["KeyS"]) camera.position.addScaledVector(dir, -speed);
 if(keys["KeyA"]) camera.position.addScaledVector(right, -speed);
 if(keys["KeyD"]) camera.position.addScaledVector(right, speed);

 renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
