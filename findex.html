<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Minecraft Clone (Terrain + Inventory)</title>
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }
#overlay { position:absolute; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; flex-direction:column; color:white; }
#hotbar { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:10px; }
.slot { width:40px; height:40px; border:2px solid white; display:flex; align-items:center; justify-content:center; }
.active { border:2px solid yellow; }
</style>
</head>
<body>

<div id="overlay">
<h1>Click to Play</h1>
<button id="startBtn">Start</button>
</div>

<div id="hotbar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(50,100,50);
scene.add(light);

// textures
const loader = new THREE.TextureLoader();
const tex = loader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');

const materials = {
 grass: new THREE.MeshLambertMaterial({map:tex}),
 dirt: new THREE.MeshLambertMaterial({map:tex}),
 stone: new THREE.MeshLambertMaterial({color:0x888888})
};

const geometry = new THREE.BoxGeometry(1,1,1);
const blocks = {};
function key(x,y,z){return `${x},${y},${z}`;}

function createBlock(x,y,z,type){
 const cube=new THREE.Mesh(geometry, materials[type]);
 cube.position.set(x,y,z);
 cube.userData.type=type;
 scene.add(cube);
 blocks[key(x,y,z)]=cube;
}

// simple noise
function noise(x,z){ return Math.sin(x*0.1)*Math.cos(z*0.1); }

function generate(cx,cz){
 for(let x=cx-20;x<cx+20;x++){
  for(let z=cz-20;z<cz+20;z++){
   const h=Math.floor(noise(x,z)*5);
   for(let y=-5;y<=h;y++){
    if(!blocks[key(x,y,z)]){
     let type = y===h ? 'grass' : (y>h-3?'dirt':'stone');
     createBlock(x,y,z,type);
    }
   }
   // trees
   if(Math.random()<0.01){
    for(let t=1;t<4;t++) createBlock(x,h+t,z,'dirt');
   }
  }
 }
}

generate(0,0);

// controls
const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

const overlay=document.getElementById('overlay');
document.getElementById('startBtn').onclick=()=>controls.lock();
controls.addEventListener('lock',()=>overlay.style.display='none');
controls.addEventListener('unlock',()=>overlay.style.display='flex');

// inventory
const inventory=['grass','dirt','stone'];
let selected=0;
const hotbar=document.getElementById('hotbar');

function renderHotbar(){
 hotbar.innerHTML='';
 inventory.forEach((item,i)=>{
  const div=document.createElement('div');
  div.className='slot'+(i===selected?' active':'');
  div.innerText=item[0];
  hotbar.appendChild(div);
 });
}
renderHotbar();

window.addEventListener('keydown',e=>{
 if(e.key>='1'&&e.key<='3'){ selected=Number(e.key)-1; renderHotbar(); }
});

// movement
let velocity=new THREE.Vector3();
let dir=new THREE.Vector3();
let moveF,moveB,moveL,moveR;
let gravity=0.03;

camera.position.y=10;

window.addEventListener('keydown',e=>{
 if(e.code==='KeyW')moveF=true;
 if(e.code==='KeyS')moveB=true;
 if(e.code==='KeyA')moveL=true;
 if(e.code==='KeyD')moveR=true;
});
window.addEventListener('keyup',e=>{
 if(e.code==='KeyW')moveF=false;
 if(e.code==='KeyS')moveB=false;
 if(e.code==='KeyA')moveL=false;
 if(e.code==='KeyD')moveR=false;
});

// raycast
const ray=new THREE.Raycaster();
window.addEventListener('mousedown',e=>{
 if(!controls.isLocked)return;
 ray.setFromCamera(new THREE.Vector2(0,0),camera);
 const hits=ray.intersectObjects(Object.values(blocks));
 if(hits.length){
  const hit=hits[0];
  const p=hit.object.position;
  if(e.button===0){ scene.remove(hit.object); delete blocks[key(p.x,p.y,p.z)]; }
  if(e.button===2){
   const n=hit.face.normal;
   createBlock(p.x+n.x,p.y+n.y,p.z+n.z,inventory[selected]);
  }
 }
});
window.addEventListener('contextmenu',e=>e.preventDefault());

function collide(x,y,z){ return blocks[key(Math.round(x),Math.floor(y-1),Math.round(z))]; }

function animate(){
 requestAnimationFrame(animate);
 dir.z=Number(moveF)-Number(moveB);
 dir.x=Number(moveR)-Number(moveL);
 dir.normalize();

 velocity.x*=0.9; velocity.z*=0.9; velocity.y-=gravity;
 if(moveF||moveB) velocity.z-=dir.z*0.1;
 if(moveL||moveR) velocity.x-=dir.x*0.1;

 controls.moveRight(-velocity.x);
 controls.moveForward(-velocity.z);
 camera.position.y+=velocity.y;

 if(collide(camera.position.x,camera.position.y,camera.position.z)){
  velocity.y=0;
 }

 generate(Math.floor(camera.position.x),Math.floor(camera.position.z));
 renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
