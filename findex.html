<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft Movement + Floor</title>

<style>
body{margin:0;overflow:hidden;background:black;}
#overlay{
 position:absolute;inset:0;
 display:flex;align-items:center;justify-content:center;
 color:white;font-family:sans-serif;cursor:pointer;
}
</style>
</head>

<body>
<div id="overlay">CLICK TO START</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// camera
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

// renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT (optional but ok) =====
scene.add(new THREE.AmbientLight(0xffffff));

// ===== FLOOR (VISIBLE) =====
const floor = new THREE.Mesh(
 new THREE.BoxGeometry(200,1,200),
 new THREE.MeshBasicMaterial({color:0x00ff00})
);
floor.position.set(0,-1,0);
scene.add(floor);

// ===== CONTROLS =====
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const overlay = document.getElementById("overlay");

overlay.onclick = () => {
 controls.lock();
 document.body.focus();
};

controls.addEventListener("lock",()=>overlay.style.display="none");
controls.addEventListener("unlock",()=>overlay.style.display="flex");

// ===== INPUT =====
const keys = {};

document.addEventListener("keydown", e => keys[e.code]=true);
document.addEventListener("keyup", e => keys[e.code]=false);

// ===== START POSITION =====
camera.position.set(0,2,5);

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed = 0.15;

 // ===== MINECRAFT DIRECTION SYSTEM =====
 const forward = new THREE.Vector3();
 camera.getWorldDirection(forward);
 forward.y = 0;
 forward.normalize();

 const right = new THREE.Vector3();
 right.crossVectors(forward, new THREE.Vector3(0,1,0)).normalize();

 // ===== MOVEMENT (W = where you look) =====
 if(keys["KeyW"]) controls.moveForward(speed);
 if(keys["KeyS"]) controls.moveForward(-speed);
 if(keys["KeyA"]) controls.moveRight(-speed);
 if(keys["KeyD"]) controls.moveRight(speed);

 // keep player above ground (simple stand system)
 camera.position.y = 2;

 renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
