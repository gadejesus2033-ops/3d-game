<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Game</title>

<style>
body{margin:0;overflow:hidden;background:black;}

#overlay{
 position:absolute;inset:0;
 display:flex;align-items:center;justify-content:center;
 color:white;font-family:sans-serif;
 background:black;
}

#crosshair{
 position:fixed;left:50%;top:50%;
 width:10px;height:10px;
 transform:translate(-50%,-50%);
}
#crosshair:before,#crosshair:after{
 content:"";position:absolute;background:white;
}
#crosshair:before{width:10px;height:2px;top:4px;}
#crosshair:after{width:2px;height:10px;left:4px;}
</style>
</head>

<body>

<div id="overlay">CLICK TO START</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.8));

// ===== CONTROLS =====
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const overlay = document.getElementById("overlay");

overlay.addEventListener("click", () => {
 controls.lock();
});

controls.addEventListener("lock", () => {
 overlay.style.display = "none";
});

controls.addEventListener("unlock", () => {
 overlay.style.display = "flex";
});

// ===== INPUT =====
const keys = {};

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

// ===== PLAYER =====
let vy = 0;
let onGround = false;

const gravity = -0.02;
const jump = 0.35;

camera.position.set(0,5,5);

// ===== WORLD =====
const blocks = [];
const geo = new THREE.BoxGeometry(1,1,1);
const mat = new THREE.MeshLambertMaterial({color:0x55aa55});

// flat ground
for(let x=-25;x<25;x++){
 for(let z=-25;z<25;z++){
  for(let y=0;y<3;y++){
   const cube = new THREE.Mesh(geo,mat);
   cube.position.set(x,y,z);
   scene.add(cube);
   blocks.push(cube);
  }
 }
}

// ===== COLLISION =====
function collide(px,py,pz){
 for(const b of blocks){
  if(Math.abs(px-b.position.x)<0.5 &&
     Math.abs(py-b.position.y)<1.8 &&
     Math.abs(pz-b.position.z)<0.5){
     return true;
  }
 }
 return false;
}

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed = 0.15;

 const forward = new THREE.Vector3();
 camera.getWorldDirection(forward);
 forward.y = 0;
 forward.normalize();

 const right = new THREE.Vector3();
 right.crossVectors(forward,new THREE.Vector3(0,1,0)).normalize();

 let nx = camera.position.x;
 let nz = camera.position.z;

 if(keys["KeyW"]){nx += forward.x * speed; nz += forward.z * speed;}
 if(keys["KeyS"]){nx -= forward.x * speed; nz -= forward.z * speed;}
 if(keys["KeyA"]){nx -= right.x * speed; nz -= right.z * speed;}
 if(keys["KeyD"]){nx += right.x * speed; nz += right.z * speed;}

 if(!collide(nx,camera.position.y-1.6,camera.position.z)){
  camera.position.x = nx;
 }
 if(!collide(camera.position.x,camera.position.y-1.6,nz)){
  camera.position.z = nz;
 }

 // gravity
 vy += gravity;
 let ny = camera.position.y + vy;

 if(vy <= 0){
  if(collide(camera.position.x,ny-1.6,camera.position.z)){
   camera.position.y = Math.floor(ny-1.6)+2.6;
   vy = 0;
   onGround = true;
  } else {
   camera.position.y = ny;
   onGround = false;
  }
 } else {
  camera.position.y = ny;
 }

 if(keys["Space"] && onGround){
  vy = jump;
  onGround = false;
 }

 renderer.render(scene,camera);
}

animate();

// resize
window.addEventListener("resize",()=>{
 camera.aspect = innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
