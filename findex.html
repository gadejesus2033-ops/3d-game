<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Engine + Inventory</title>

<style>
body{margin:0;overflow:hidden;background:black;}
#overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:white;background:black;cursor:pointer;}
#crosshair{position:fixed;left:50%;top:50%;width:10px;height:10px;transform:translate(-50%,-50%);}
#crosshair:before,#crosshair:after{content:"";position:absolute;background:white;}
#crosshair:before{width:10px;height:2px;top:4px;}
#crosshair:after{width:2px;height:10px;left:4px;}
#hud{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);color:white;font-family:sans-serif;}
</style>
</head>

<body>
<div id="overlay">CLICK TO START</div>
<div id="crosshair"></div>
<div id="hud"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>

// ===== SETUP =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.6));

const controls=new THREE.PointerLockControls(camera,document.body);
scene.add(controls.getObject());

overlay.onclick=()=>controls.lock();
controls.addEventListener("lock",()=>overlay.style.display="none");
controls.addEventListener("unlock",()=>overlay.style.display="flex");

// ===== INPUT =====
const keys={},inv={};
let breaking=false;

onkeydown=e=>keys[e.code]=true;
onkeyup=e=>keys[e.code]=false;

addEventListener("mousedown",e=>{
 if(e.button===0) breaking=true;
});
addEventListener("mouseup",e=>{
 if(e.button===0) breaking=false;
});

// ===== PLAYER =====
const HEIGHT=1.8,EYE=1.6,WIDTH=0.3;

// ===== TEXTURES =====
function tex(c){
 const c2=document.createElement("canvas");
 c2.width=8;c2.height=8;
 const ctx=c2.getContext("2d");
 for(let x=0;x<8;x++)for(let y=0;y<8;y++){
  let s=c+Math.random()*20;
  ctx.fillStyle=`rgb(${s},${s},${s})`;
  ctx.fillRect(x,y,1,1);
 }
 const t=new THREE.CanvasTexture(c2);
 t.magFilter=t.minFilter=THREE.NearestFilter;
 return t;
}

const mats={
 grass:new THREE.MeshLambertMaterial({map:tex(120)}),
 dirt:new THREE.MeshLambertMaterial({map:tex(100)}),
 stone:new THREE.MeshLambertMaterial({map:tex(80)}),
 coal:new THREE.MeshLambertMaterial({map:tex(60)}),
 iron:new THREE.MeshLambertMaterial({map:tex(150)})
};

const geo=new THREE.BoxGeometry(1,1,1);

// ===== WORLD =====
const world=new Map();
const blocks=new Map();
const key=(x,y,z)=>`${x},${y},${z}`;

function addItem(type){
 inv[type]=(inv[type]||0)+1;
}

function place(x,y,z,type){
 const k=key(x,y,z);
 if(blocks.has(k)) return;

 const b=new THREE.Mesh(geo,mats[type]);
 b.position.set(x,y,z);
 scene.add(b);

 blocks.set(k,b);
 world.set(k,type);
}

// ===== GENERATION =====
const SIZE=200;

for(let x=-SIZE;x<SIZE;x++){
 for(let z=-SIZE;z<SIZE;z++){

  let surface=5;

  // grass + dirt layers
  for(let y=surface;y>surface-4;y--){
   place(x,y,z,y===surface?"grass":"dirt");
  }

  // stone layers with ores
  for(let y=surface-4;y>-38;y--){

   let type="stone";

   if(Math.random()<0.05) type="coal";
   if(Math.random()<0.02) type="iron";

   place(x,y,z,type);
  }
 }
}

// ===== COLLISION =====
function collide(px,py,pz){
 for(let x=Math.floor(px-WIDTH);x<=Math.floor(px+WIDTH);x++)
 for(let y=Math.floor(py);y<=Math.floor(py+HEIGHT);y++)
 for(let z=Math.floor(pz-WIDTH);z<=Math.floor(pz+WIDTH);z++)
  if(world.has(key(x,y,z))) return true;
 return false;
}

// ===== PHYSICS =====
let vy=0,onGround=false;
const gravity=-0.02,jump=0.35;

camera.position.set(0,20,0);

// ===== RAY =====
const ray=new THREE.Raycaster();
ray.far=6;

let target=null,breakTimer=0;

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 const speed=0.15;

 const f=new THREE.Vector3();
 camera.getWorldDirection(f);f.y=0;f.normalize();

 const r=new THREE.Vector3();
 r.crossVectors(f,new THREE.Vector3(0,1,0)).normalize();

 let dx=0,dz=0;
 if(keys["KeyW"]){dx+=f.x*speed;dz+=f.z*speed;}
 if(keys["KeyS"]){dx-=f.x*speed;dz-=f.z*speed;}
 if(keys["KeyA"]){dx-=r.x*speed;dz-=r.z*speed;}
 if(keys["KeyD"]){dx+=r.x*speed;dz+=r.z*speed;}

 let nx=camera.position.x+dx,nz=camera.position.z+dz;

 if(!collide(nx,camera.position.y-EYE,camera.position.z)) camera.position.x=nx;
 if(!collide(camera.position.x,camera.position.y-EYE,nz)) camera.position.z=nz;

 vy+=gravity;
 let ny=camera.position.y+vy;

 if(vy<=0){
  if(collide(camera.position.x,ny-EYE,camera.position.z)){
   camera.position.y=Math.floor(ny-EYE)+EYE+1;
   vy=0;onGround=true;
  } else camera.position.y=ny;
 } else camera.position.y=ny;

 // ===== RAY =====
 ray.setFromCamera({x:0,y:0},camera);
 const hits=ray.intersectObjects([...blocks.values()]);

 if(hits.length){
  const h=hits[0];
  const pos=h.object.position.clone();
  target=pos;

  if(breaking){
   breakTimer++;
   if(breakTimer>8){

    const k=key(pos.x,pos.y,pos.z);

    if(blocks.has(k)){
     const type=world.get(k);

     addItem(type);

     scene.remove(blocks.get(k));
     blocks.delete(k);
     world.delete(k);
    }

    breakTimer=0;
   }
  } else breakTimer=0;

 } else breakTimer=0;

 // HUD
 hud.innerText=JSON.stringify(inv,null,1);

 renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
